<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

function MathText({ children, block }) {

  useEffect(() => {

      window.MathJax.typesetPromise([ref.current]).catch(() => {});

  });
  if (block) return <div ref={ref} className="math-block">{children}</div>;
  return <span ref={ref}>{children}</span>;
}

// ============================================================
// DATA: Worlds, Levels, Exercises
// ============================================================

const WORLDS = [
  { id: 1, name: "Erwartungswert", icon: "рҹҺҜ", color: "#58cc02", desc: "E(В·) вҖ“ Rechenregeln fГјr Erwartungswerte" },
  { id: 2, name: "Varianz", icon: "рҹ“Ҡ", color: "#1cb0f6", desc: "Var(В·) вҖ“ StreuungsmaГҹe beherrschen" },
  { id: 3, name: "Kovarianz", icon: "рҹ”—", color: "#ce82ff", desc: "Cov(В·,В·) вҖ“ ZusammenhГӨnge berechnen" },
  { id: 4, name: "Regression", icon: "рҹ“Ҳ", color: "#ff9600", desc: "E(Y|X), Residuen und RВІ" },
  { id: 5, name: "KTT Grundlagen", icon: "рҹ§ұ", color: "#ff4b4b", desc: "Y = П„ + Оө вҖ“ Klassische Testtheorie" },
  { id: 6, name: "KTT-Modelle", icon: "рҹҸ—пёҸ", color: "#ffc800", desc: "Parallel, ess. П„-ГӨquivalent, П„-kongenerisch" },
  { id: 7, name: "Pfaddiagramme", icon: "рҹ”Җ", color: "#58cc02", desc: "Pfaddiagramme вҶ’ Gleichungen" },
  { id: 8, name: "Impl. Kovarianzmatrix", icon: "рҹ§®", color: "#1cb0f6", desc: "Modellimpliierte ОЈ berechnen" },
  { id: 9, name: "CFA", icon: "рҹ”¬", color: "#ce82ff", desc: "Konfirmatorische Faktorenanalyse" },
];

// Rule cards (Box F.1 from Steyer & Eid)
const RULES = {
  E1: { id: "E1", label: "(i)", text: "\\(E(\\alpha) = \\alpha\\)", desc: "Der Erwartungswert einer Konstanten ist die Konstante selbst.",
    psychologie: "In der Diagnostik werden hГӨufig Konstanten zu Testwerten addiert (z.\u00A0B. ein Schwierigkeitsparameter oder ein fester Zuschlag bei der Normierung). Um den erwarteten Gesamtwert eines Tests zu berechnen, muss man wissen, dass sich der Erwartungswert einer Konstanten nicht verГӨndert вҖ“ sie geht einfach als fester Wert in die Berechnung ein. Das ist auch die Grundlage dafГјr, Intercepts in Regressionsmodellen korrekt zu interpretieren." },
  E2: { id: "E2", label: "(ii)", text: "\\(E(\\alpha X + \\beta Y) = \\alpha E(X) + \\beta E(Y)\\)", desc: "Der Erwartungswert ist linear.",
    psychologie: "In der Psychologie bildet man stГӨndig gewichtete Summen: Skalenwerte als Summe von Items, Composite-Scores aus Subtests, oder gewichtete PrГӨdiktoren in der Regressionsdiagnostik. Die LinearitГӨt des Erwartungswerts erlaubt es, den erwarteten Gesamtwert direkt aus den Erwartungswerten der Einzelteile zu berechnen вҖ“ z.\u00A0B. den erwarteten IQ-Gesamtwert aus den mittleren Subtestwerten. Ohne diese Regel wГӨre die Interpretation zusammengesetzter Scores nicht mГ¶glich." },
  V1: { id: "V1", label: "(iii)", text: "\\(\\text{Var}(X) = E(X^{2}) - [E(X)]^{2}\\)", desc: "Verschiebungssatz der Varianz.",
    psychologie: "Der Verschiebungssatz ist die rechnerische Grundlage, um aus Rohdaten (Summen und Quadratsummen) die Varianz zu bestimmen. In der Forschungsmethodik wird er benГ¶tigt, um StreuungsmaГҹe effizient zu berechnen вҖ“ etwa bei der Varianzanalyse (ANOVA) oder bei der Bestimmung von EffektstГӨrken. In der Diagnostik ist die Varianz die Basis fГјr ReliabilitГӨt und Standardmessfehler." },
  V2: { id: "V2", label: "(iv)", text: "\\(\\text{Var}(X) = 0\\), falls \\(X = \\alpha\\) (Konstante)", desc: "Eine Konstante hat keine Streuung.",
    psychologie: "Wenn ein Testwert bei allen Personen identisch ausfГӨllt (z.\u00A0B. ein Item, das jeder richtig lГ¶st), hat er keine Varianz und trГӨgt weder zur ReliabilitГӨt noch zur ValiditГӨt bei. Diese Regel erklГӨrt, warum Items mit extremer Schwierigkeit (p вүҲ 0 oder p вүҲ 1) bei der Testkonstruktion eliminiert werden: Sie liefern keine Information Гјber interindividuelle Unterschiede." },
  V3: { id: "V3", label: "(v)", text: "\\(\\text{Var}(\\alpha X) = \\alpha^{2} \\, \\text{Var}(X)\\)", desc: "Skalierung geht quadratisch in die Varianz ein.",
    psychologie: "Wenn man Testwerte umrechnet (z.\u00A0B. von Rohwerten in IQ-Punkte durch Multiplikation mit einem Faktor), verГӨndert sich die Varianz quadratisch. Das ist entscheidend fГјr die z-Standardisierung: Teilt man durch die Standardabweichung (Пғ), wird Var(X/Пғ) = Var(X)/ПғВІ = 1. Auch bei der Gewichtung von Subtests in Testbatterien muss man wissen, dass ein doppeltes Gewicht die Varianz vervierfacht, nicht verdoppelt." },
  V4: { id: "V4", label: "(vi)", text: "\\(\\text{Var}(\\alpha + X) = \\text{Var}(X)\\)", desc: "Verschiebung ГӨndert die Varianz nicht.",
    psychologie: "Ob man zu jedem IQ-Wert 100 addiert oder nicht вҖ“ die Streuung bleibt gleich. Diese Translationsinvarianz ist grundlegend fГјr die Normierung: Man kann Skalenmittelwerte beliebig verschieben (z.\u00A0B. auf M = 100 oder M = 50), ohne die ReliabilitГӨt oder die DifferenzierungsfГӨhigkeit des Tests zu verГӨndern. Auch bei der Zentrierung von PrГӨdiktoren in der Regression bleibt die Varianz erhalten." },
  V5: { id: "V5", label: "(vii)", text: "\\(\\text{Var}(\\alpha X + \\beta Y) = \\alpha^{2}\\text{Var}(X) + \\beta^{2}\\text{Var}(Y) + 2\\alpha\\beta\\text{Cov}(X,Y)\\)", desc: "Varianz einer Linearkombination zweier Zufallsvariablen.",
    psychologie: "Dies ist die zentrale Formel fГјr die Diagnostik: Die Varianz eines Gesamttestwertes (Summe aus Subtests) hГӨngt nicht nur von den Einzelvarianzen ab, sondern auch von den Kovarianzen zwischen den Subtests. Deshalb sind hoch korrelierende Items in einer Skala wГјnschenswert вҖ“ sie erhГ¶hen die Gesamtvarianz und damit die ReliabilitГӨt. In Strukturgleichungsmodellen wird diese Regel verwendet, um die modellimplizierte Kovarianzmatrix abzuleiten." },
  C1: { id: "C1", label: "(viii)", text: "\\(\\text{Cov}(X,Y) = E(XY) - E(X)\\,E(Y)\\)", desc: "Verschiebungssatz der Kovarianz.",
    psychologie: "Die Kovarianz ist das Fundament der Korrelation und damit der gesamten korrelativen Forschung in der Psychologie. Ob Zusammenhang zwischen Intelligenz und Schulleistung, zwischen Therapiedauer und Symptomreduktion, oder zwischen zwei Testitems вҖ“ stets wird die Kovarianz benГ¶tigt. Der Verschiebungssatz ermГ¶glicht die effiziente Berechnung aus Rohdaten (Produktsummen und Einzelsummen)." },
  C2: { id: "C2", label: "(ix)", text: "\\(\\text{Cov}(X,Y) = 0\\), falls \\(X = \\alpha\\) (Konstante)", desc: "Eine Konstante kovariiert mit nichts.",
    psychologie: "Ein Merkmal ohne Variation kann mit nichts zusammenhГӨngen. In der Diagnostik bedeutet das: Ein Item, das alle Personen gleich beantworten, korreliert mit keinem Kriterium und ist fГјr die Vorhersage nutzlos. In der Forschungsmethodik erklГӨrt dies, warum Kovariaten in experimentellen Designs Varianz aufweisen mГјssen, um als Kontrollvariablen wirksam zu sein." },
  C3: { id: "C3", label: "(x)", text: "\\(\\text{Cov}(\\alpha X, \\beta Y) = \\alpha\\beta \\, \\text{Cov}(X,Y)\\)", desc: "Skalierungsfaktoren werden herausgezogen.",
    psychologie: "Wenn man Testwerte umskaliert (z.\u00A0B. Rohwerte in T-Werte), verГӨndern sich Kovarianzen und Korrelationen vorhersagbar. Diese Regel erklГӨrt, warum die Korrelation (als standardisierte Kovarianz) skalierungsinvariant ist вҖ“ ein entscheidender Vorteil fГјr den Vergleich von ZusammenhГӨngen Гјber verschiedene Studien hinweg. In der CFA steckt diese Regel in der Beziehung zwischen Faktorladungen und beobachteten Kovarianzen." },
  C4: { id: "C4", label: "(xi)", text: "\\(\\text{Cov}(\\alpha+X,\\, \\beta+Y) = \\text{Cov}(X,Y)\\)", desc: "Verschiebungen ГӨndern die Kovarianz nicht.",
    psychologie: "Ob man die Depressionsskala bei 0 oder bei 50 beginnen lГӨsst вҖ“ der Zusammenhang mit anderen Variablen ГӨndert sich nicht. Diese Translationsinvarianz der Kovarianz ist wichtig fГјr die Forschungspraxis: Zentrierung von Variablen (z.\u00A0B. um Mittelwert 0) verГӨndert keine Korrelationen und keinen Zusammenhang, was bei der Interpretation von Interaktionseffekten in der Regression relevant ist." },
  C5: { id: "C5", label: "(xii)", text: "\\(\\text{Cov}(\\alpha_{1} X_{1} + \\alpha_{2} X_{2},\\; \\beta_{1} Y_{1} + \\beta_{2} Y_{2}) = \\alpha_{1}\\beta_{1}\\text{Cov}(X_{1},Y_{1}) + \\alpha_{1}\\beta_{2}\\text{Cov}(X_{1},Y_{2}) + \\alpha_{2}\\beta_{1}\\text{Cov}(X_{2},Y_{1}) + \\alpha_{2}\\beta_{2}\\text{Cov}(X_{2},Y_{2})\\)", desc: "BilinearitГӨt der Kovarianz.",
    psychologie: "Diese allgemeine Regel ist der SchlГјssel zur Strukturgleichungsmodellierung (SEM): Wenn man wissen will, wie zwei Skalenwerte (jeweils Summen mehrerer Items) zusammenhГӨngen, braucht man alle paarweisen Item-Kovarianzen. In der konfirmatorischen Faktorenanalyse (CFA) wird genau diese Regel benutzt, um aus Faktorladungen und Faktorvarianzen die erwarteten Kovarianzen zwischen beobachteten Variablen abzuleiten вҖ“ das ist die modellimplizierte Kovarianzmatrix ОЈ(Оё)." },
};

// Regression rules (Box G.1 from Steyer & Eid)
const REG_RULES = {
  R1: { id: "R1", label: "G(i)", text: "\\(E(\\alpha \\mid X) = \\alpha, \\quad \\alpha \\in \\mathbb{R}\\)", desc: "Der bedingte Erwartungswert einer Konstanten ist die Konstante selbst.",
    psychologie: "Wenn ein Merkmalswert fГјr alle Personen gleich ist (z.\u00A0B. ein fester Aufgaben-Schwierigkeitsparameter), dann ГӨndert sich daran auch nichts, wenn man nach einer anderen Variable bedingt. Das ist die Grundlage dafГјr, dass Intercepts in Regressionsmodellen als feste Werte interpretiert werden kГ¶nnen." },
  R2: { id: "R2", label: "G(ii)", text: "\\(E(\\alpha Y_{1} + \\beta Y_{2} \\mid X) = \\alpha\\, E(Y_{1} \\mid X) + \\beta\\, E(Y_{2} \\mid X)\\)", desc: "Der bedingte Erwartungswert ist linear.",
    psychologie: "In der Psychologie werden oft zusammengesetzte Kriterien vorhergesagt (z.\u00A0B. Gesamtleistung als Summe von Subtests). Die LinearitГӨt der bedingten Erwartung erlaubt es, die Vorhersage des Gesamtscores aus den Einzelvorhersagen zusammenzusetzen вҖ“ die Grundlage fГјr multiple Regressionsmodelle in der Forschungspraxis." },
  R3: { id: "R3", label: "G(iii)", text: "\\(E\\bigl[E(Y \\mid X)\\bigr] = E(Y)\\)", desc: "Turmregel (Law of Iterated Expectations): Der Erwartungswert der bedingten Erwartung ist der unbedingte Erwartungswert.",
    psychologie: "Egal, wie man Personen in Subgruppen aufteilt (z.\u00A0B. nach Geschlecht) вҖ“ der gewichtete Durchschnitt aller Gruppenvorhersagen ergibt wieder den Gesamtdurchschnitt. Diese Regel ist fundamental fГјr die Varianzzerlegung in der ANOVA und erklГӨrt, warum gruppenspezifische Vorhersagen im Mittel die Gesamtpopulation korrekt abbilden." },
  R4: { id: "R4", label: "G(iv)", text: "\\(E\\bigl[f(X) \\mid X\\bigr] = f(X)\\)", desc: "Eine Funktion des Regressors ist unter Bedingung auf diesen Regressor вҖҡbekannt'.",
    psychologie: "Wenn man nach dem IQ bedingt, dann ist auch der quadrierte IQ вҖҡbekannt'. In der Regressionsdiagnostik bedeutet das: Polynomiale Terme (z.\u00A0B. \\(X^{2}\\)) in einem Modell verhalten sich unter Bedingung auf \\(X\\) wie Konstanten. Das ist die Grundlage dafГјr, dass man den Regressor als вҖҡfixiert' behandeln kann." },
  R5: { id: "R5", label: "G(v)", text: "\\(E\\bigl[E(Y \\mid X) \\mid f(X)\\bigr] = E\\bigl[Y \\mid f(X)\\bigr]\\)", desc: "GlГӨttungseigenschaft: VergrГ¶bern des Regressors vereinfacht die Regression.",
    psychologie: "Wenn man statt des genauen IQ-Werts nur die IQ-Kategorie (unter-, durchschnittlich, Гјber-) verwendet, dann ist die Regression auf die Kategorie gleich dem bedingten Erwartungswert von Y gegeben die Kategorie. In der Praxis wird das relevant bei der Bildung von Clustern oder der Kategorisierung kontinuierlicher PrГӨdiktoren." },
  R6: { id: "R6", label: "G(vi)", text: "\\(E\\bigl[f(X) \\cdot Y \\mid X\\bigr] = f(X) \\cdot E(Y \\mid X)\\)", desc: "Herausziehen bekannter Faktoren aus der bedingten Erwartung.",
    psychologie: "Wenn eine Variable unter der Bedingung вҖҡbekannt' ist (weil sie eine Funktion des Regressors ist), kann man sie vor die bedingte Erwartung ziehen вҖ“ genau wie eine Konstante. Das ist die Basis fГјr die Herleitung von Interaktionseffekten und Moderationsanalysen in der psychologischen Forschung." },
  Res1: { id: "Res1", label: "G(vii)", text: "\\(E(\\varepsilon) = 0\\)", desc: "Das Residuum hat Erwartungswert 0.",
    psychologie: "In jedem Regressionsmodell sind die Vorhersagefehler im Mittel null вҖ“ das Modell ist also im Durchschnitt korrekt. In der Diagnostik heiГҹt das: Der vorhergesagte Therapieerfolg ist im Mittel Гјber alle Patienten weder zu optimistisch noch zu pessimistisch. Systematische Abweichungen wГӨren ein Zeichen fГјr Modellmissspezifikation." },
  Res2: { id: "Res2", label: "G(viii)", text: "\\(\\text{Cov}\\bigl[\\varepsilon,\\; E(Y \\mid X)\\bigr] = 0\\)", desc: "Residuum und Vorhersage sind unkorreliert.",
    psychologie: "Der Vorhersagefehler hГӨngt nicht mit der Vorhersage zusammen. In der Diagnostik ist das wichtig: Ob jemand eine hohe oder niedrige Prognose erhГӨlt, sagt nichts darГјber, wie groГҹ der Vorhersagefehler ist. Verletzungen dieser Eigenschaft (z.\u00A0B. bei HeteroskedastizitГӨt) erfordern robuste Standardfehler." },
  Res3: { id: "Res3", label: "G(ix)", text: "\\(\\text{Var}(Y) = \\text{Var}\\bigl[E(Y \\mid X)\\bigr] + \\text{Var}(\\varepsilon)\\)", desc: "Varianzzerlegung: Gesamtvarianz = erklГӨrte Varianz + Residualvarianz.",
    psychologie: "Das ist die zentrale Zerlegung der VarianzaufklГӨrung: \\(R^{2} = \\text{Var}[E(Y|X)] / \\text{Var}(Y)\\) gibt an, wieviel Prozent der Varianz eines Kriteriums durch den PrГӨdiktor erklГӨrt werden. Ein \\(R^{2} = 0{,}25\\) bedeutet: 25 % der Unterschiede (z.\u00A0B. in Therapieerfolg) werden durch den PrГӨdiktor (z.\u00A0B. Schweregrad) erklГӨrt." },
  Res4: { id: "Res4", label: "G(x)", text: "\\(E(\\varepsilon \\mid X) = 0\\)", desc: "Das Residuum hat bedingten Erwartungswert 0 gegeben den Regressor.",
    psychologie: "FГјr jeden einzelnen Wert des PrГӨdiktors ist der mittlere Vorhersagefehler null. Das ist strenger als \\(E(\\varepsilon) = 0\\) und bedeutet: Es gibt keine systematischen Vorhersagefehler in Subgruppen. In der Diagnostik heiГҹt das z.\u00A0B.: Der Vorhersagefehler fГјr Therapieerfolg ist im Mittel null, egal ob die Patienten schwer oder leicht erkrankt sind." },
  Res5: { id: "Res5", label: "G(xi)", text: "\\(E\\bigl[\\varepsilon \\mid f(X)\\bigr] = 0\\)", desc: "Das Residuum hat bedingten Erwartungswert 0 gegeben jede Funktion des Regressors.",
    psychologie: "Nicht nur fГјr \\(X\\) selbst, sondern auch fГјr jede Transformation \\(f(X)\\) (z.\u00A0B. \\(X^{2}\\), \\(\\log X\\)) ist der mittlere Vorhersagefehler null. Das schlieГҹt nichtlineare ZusammenhГӨnge zwischen Fehler und PrГӨdiktor aus вҖ“ eine wichtige Modellannahme, deren Verletzung auf fehlende nichtlineare Terme hinweist." },
  Res6: { id: "Res6", label: "G(xii)", text: "\\(\\text{Cov}\\bigl[\\varepsilon,\\; f(X)\\bigr] = 0\\)", desc: "Residuum und jede Funktion des Regressors sind unkorreliert.",

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Shuffle multiple-choice options and update correct index
function shuffleMC(options, correctIndex) {
  const indexed = options.map((opt, i) => ({ opt, isCorrect: i === correctIndex }));
  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }
  return {
    options: indexed.map(x => x.opt),
    correct: indexed.findIndex(x => x.isCorrect),
  };
}

      {r.psychologie && (
        <div style={{ marginTop: 8 }}>
          <button onClick={() => setShowPsych(!showPsych)} style={{
            background: 'none',
            border: 'none',
            color: 'var(--orange)',
            fontSize: '0.85em',
            fontWeight: 600,
            cursor: 'pointer',
            padding: 0,
            textDecoration: 'underline',
            textDecorationStyle: 'dotted',
          }}>
            рҹ§  {showPsych ? 'Anwendung ausblenden' : 'Wozu brauche ich das als Psychologe/in?'}
          </button>
          {showPsych && (
            <div style={{
              marginTop: 8,
              padding: '10px 14px',
              background: 'var(--hint-bg)',
              border: '1px solid var(--hint-border)',
              borderRadius: 8,
              fontSize: '0.88em',
              lineHeight: 1.6,
              color: 'var(--text)',
            }}>
              <MathText>{r.psychologie}</MathText>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ProgressBar({ current, total }) {
  const pct = total > 0 ? (current / total) * 100 : 0;
  return (
    <div style={{
      width: '100%',
      height: 12,
      background: 'var(--bg-light)',
      borderRadius: 6,
      overflow: 'hidden',
      marginBottom: 16,
    }}>
      <div style={{
        width: `${pct}%`,
        height: '100%',
        background: 'var(--green)',
        borderRadius: 6,
        transition: 'width 0.4s ease',
      }} />
    </div>
  );
}

function Hearts({ lives }) {
  return (
    <div style={{ display: 'flex', gap: 4 }}>
      {[1,2,3].map(i => (
        <span key={i} style={{ fontSize: 20, opacity: i <= lives ? 1 : 0.2 }}>вқӨпёҸ</span>
      ))}
    </div>
  );
}

function PsychRelevance({ exercise }) {
  const [show, setShow] = useState(false);
  // Get psychologie text: either directly from exercise, or from linked rule
  let text = exercise.psychologie;
  if (!text && exercise.rule) {
    const r = RULES[exercise.rule] || REG_RULES[exercise.rule] || KTT_RULES[exercise.rule];
    if (r) text = r.psychologie;
  }
  if (!text) return null;
  return (
    <div style={{ marginTop: 10, marginBottom: 4 }}>
      <button onClick={() => setShow(!show)} style={{
        background: 'none',
        border: 'none',
        color: 'var(--purple)',
        fontSize: '0.85em',
        fontWeight: 600,
        cursor: 'pointer',
        padding: 0,
        textDecoration: 'underline',
        textDecorationStyle: 'dotted',
      }}>
        рҹ§  {show ? 'Anwendung ausblenden' : 'Wozu brauche ich das als Psychologe/in?'}
      </button>
      {show && (
        <div style={{
          marginTop: 8,
          padding: '10px 14px',
          background: 'var(--psych-bg)',
          border: '1px solid var(--psych-border)',
          borderRadius: 8,
          fontSize: '0.88em',
          lineHeight: 1.6,
          color: 'var(--text)',
        }}>
          <MathText>{text}</MathText>
        </div>
      )}
    </div>
  );
}

function FillBlankExercise({ exercise, onAnswer }) {
  const [value, setValue] = useState('');
  const [showHint, setShowHint] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, [exercise]);

  const handleSubmit = () => {
    if (!value.trim()) return;
    const normalize = s => {
      const n = parseFloat(s.trim().replace(/,/g, '.'));
      return isNaN(n) ? s.trim().toLowerCase() : n;
    };
    const correct = normalize(value) === normalize(exercise.answer);
    onAnswer(correct);
    setValue('');
    setShowHint(false);
  };

  return (
    <div>
      <div style={{ fontSize: '1.1em', marginBottom: 8, lineHeight: 1.6 }}><MathText>{exercise.question}</MathText></div>
      <MathText block>{exercise.prompt.replace('?', '\\,\\boxed{\\phantom{00}}')}</MathText>
      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
        <input
          ref={inputRef}
          type="text"
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleSubmit()}
          placeholder="Deine Antwort..."
          style={{
            flex: 1,
            padding: '12px 16px',
            borderRadius: 12,
            border: '2px solid var(--input-border)',
            background: 'var(--input-bg)',
            color: 'var(--text)',
            fontSize: '1.1em',
            fontFamily: "'Cambria Math', Georgia, serif",
            outline: 'none',
          }}
        />
        <button onClick={handleSubmit} disabled={!value.trim()} style={{
          padding: '12px 24px',
          borderRadius: 12,
          border: 'none',
          background: value.trim() ? 'var(--green)' : 'var(--bg-light)',
          color: '#fff',
          fontWeight: 700,
          fontSize: '1em',
          transition: 'background 0.2s',
        }}>
          PrГјfen
        </button>
      </div>
      {!showHint && (
        <button onClick={() => setShowHint(true)} style={{
          marginTop: 12,
          background: 'none',
          border: 'none',
          color: 'var(--text-dim)',
          fontSize: '0.85em',
          textDecoration: 'underline',
        }}>
          рҹ’Ў Hinweis anzeigen
        </button>
      )}
      {showHint && (
        <div style={{
          marginTop: 12,
          padding: '10px 14px',
          background: 'var(--hint-bg)',
          border: '1px solid var(--hint-border)',
          borderRadius: 8,
          fontSize: '0.9em',
          color: 'var(--orange)',
        }}>
          рҹ’Ў <MathText>{exercise.hint}</MathText>
        </div>
      )}
    </div>
  );
}

function MultipleChoiceExercise({ exercise, onAnswer }) {
  const [selected, setSelected] = useState(null);

  const handleSelect = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    setTimeout(() => {
      onAnswer(idx === exercise.correct);
      setSelected(null);
    }, 800);
  };

  return (
    <div>
      <div style={{ fontSize: '1.1em', marginBottom: 16, lineHeight: 1.6 }}><MathText>{exercise.question}</MathText></div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {exercise.options.map((opt, idx) => {
          let bg = 'var(--bg-light)';
          let border = '2px solid transparent';
          if (selected !== null) {
            if (idx === exercise.correct) { bg = 'rgba(88,204,2,0.18)'; border = '2px solid var(--green)'; }
            else if (idx === selected && idx !== exercise.correct) { bg = 'rgba(255,75,75,0.18)'; border = '2px solid var(--red)'; }
          }
          return (
            <button key={idx} onClick={() => handleSelect(idx)} style={{
              padding: '14px 18px',
              borderRadius: 12,
              background: bg,
              border: border,
              color: 'var(--text)',
              textAlign: 'left',
              fontSize: '1em',
              transition: 'all 0.2s',
              cursor: selected !== null ? 'default' : 'pointer',
            }}>
              <span style={{ color: 'var(--text-dim)', marginRight: 10, fontWeight: 700 }}>
                {['A', 'B', 'C', 'D'][idx]}
              </span>
              <MathText>{opt}</MathText>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function FeedbackBanner({ correct, explanation }) {
  if (correct === null) return null;
  return (
    <div style={{
      position: 'fixed',
      bottom: 0,
      left: 0,
      right: 0,
      padding: '16px 24px',
      background: correct ? 'var(--feedback-correct-bg)' : 'var(--feedback-wrong-bg)',
      color: '#fff',
      fontWeight: 700,
      fontSize: '1.1em',
      zIndex: 100,
      animation: 'slideUp 0.3s ease',
      display: 'flex',
      alignItems: 'center',
      gap: 12,
    }}>
      <span style={{ fontSize: '1.5em' }}>{correct ? 'вң…' : 'вқҢ'}</span>
      <span>{correct ? 'Richtig!' : 'Leider falsch.'}</span>
      {!correct && explanation && (
        <span style={{ fontWeight: 400, fontSize: '0.9em', marginLeft: 8 }}>{explanation}</span>
      )}
    </div>
  );
}

function WorldMap({ onSelectWorld, progress }) {
  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '24px 16px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
        {WORLDS.map((w, idx) => {
          const p = progress[w.id] || { completed: 0, total: 0 };
          const done = p.completed >= p.total && p.total > 0;
          return (
            <button
              key={w.id}
              onClick={() => onSelectWorld(w.id)}
              style={{
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: 8,
                padding: '20px 12px',
                borderRadius: 16,
                border: done ? `2px solid ${w.color}` : '2px solid transparent',
                background: 'var(--bg-card)',
                cursor: 'pointer',
                textAlign: 'center',
                transition: 'all 0.2s',
              }}
            >
              <div style={{
                width: 52, height: 52,
                borderRadius: '50%',
                background: done ? w.color : 'var(--bg-light)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '1.5em',
                flexShrink: 0,
              }}>
                {done ? 'вӯҗ' : w.icon}
              </div>
              <div style={{ width: '100%' }}>
                <div style={{ fontWeight: 700, fontSize: '0.95em' }}>
                  {w.name}
                </div>
                <div style={{ fontSize: '0.75em', color: 'var(--text-dim)', marginTop: 2 }}>{w.desc}</div>
                {p.total > 0 && (
                  <div style={{
                    marginTop: 6,
                    height: 6,
                    background: 'var(--bg)',
                    borderRadius: 3,
                    overflow: 'hidden',
                  }}>
                    <div style={{
                      width: `${(p.completed / p.total) * 100}%`,
                      height: '100%',
                      background: w.color,
                      borderRadius: 3,
                    }} />
                  </div>
                )}
              </div>
              {done && <span style={{ fontSize: '1.2em', color: w.color }}>вң“</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function getRulesForWorld(worldId) {
  if (worldId <= 1) return [RULES.E1, RULES.E2];
  if (worldId === 2) return [RULES.V1, RULES.V2, RULES.V3, RULES.V4, RULES.V5];
  if (worldId === 3) return [RULES.C1, RULES.C2, RULES.C3, RULES.C4, RULES.C5];
  if (worldId === 4) return [...Object.values(REG_RULES)];
  if (worldId <= 6) return [...Object.values(RULES), ...Object.values(REG_RULES), ...Object.values(KTT_RULES)];
  return [...Object.values(RULES), ...Object.values(REG_RULES), ...Object.values(KTT_RULES)];
}

function RuleDisplay({ worldId, currentRule, ruleMode, setRuleMode }) {
  const allRules = getRulesForWorld(worldId);

  return (
    <div style={{ marginBottom: 16 }}>
      <select
        value={ruleMode}
        onChange={e => setRuleMode(e.target.value)}
        style={{
          background: 'var(--bg-light)',
          border: '1px solid var(--card-border)',
          color: 'var(--text)',
          padding: '8px 14px',
          borderRadius: 8,
          fontSize: '0.85em',
          fontWeight: 600,
          cursor: 'pointer',
          appearance: 'auto',
        }}
      >
        <option value="current">рҹҺҜ passende Regel einblenden</option>
        <option value="all">рҹ“– alle Regeln einblenden</option>
        <option value="none">Regeln ausblenden</option>
      </select>
      {ruleMode === 'current' && currentRule && (
        <div style={{ marginTop: 8 }}>
          <RuleCard rule={currentRule} />
        </div>
      )}
      {ruleMode === 'all' && (
        <div style={{ marginTop: 8, maxHeight: 300, overflowY: 'auto', paddingRight: 8 }}>
          {allRules.map(r => <RuleCard key={r.id} rule={r.id} />)}
        </div>
      )}
    </div>
  );
}

function LevelSession({ worldId, onBack, progress, setProgress }) {
  const [exercises, setExercises] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [lives, setLives] = useState(3);
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [sessionDone, setSessionDone] = useState(false);
  const [streak, setStreak] = useState(0);
  const [ruleMode, setRuleMode] = useState('current');

  useEffect(() => {
    const gen = EXERCISE_GENERATORS[worldId];
    if (gen) {
      setExercises(shuffleArray(gen()));
    }
  }, [worldId]);

  const handleAnswer = useCallback((correct) => {
    setFeedback(correct);
    if (correct) {
      setScore(s => s + 1);
      setStreak(s => s + 1);
    } else {
      setLives(l => l - 1);
      setStreak(0);
    }
    setTimeout(() => {
      setFeedback(null);
      if (!correct && lives <= 1) {
        setSessionDone(true);
        return;
      }
      if (currentIdx + 1 >= exercises.length) {
        setSessionDone(true);
        setProgress(p => ({
          ...p,
          [worldId]: { completed: score + (correct ? 1 : 0), total: exercises.length }
        }));
        return;
      }
      setCurrentIdx(i => i + 1);
    }, 2000);
  }, [currentIdx, exercises.length, lives, score, worldId, setProgress]);

  const world = WORLDS.find(w => w.id === worldId);
  if (!world) return <div>Loading...</div>;

  if (!exercises.length) return <div>Generating exercises...</div>;

  if (sessionDone) {
    return (
      <div style={{ maxWidth: 520, margin: '0 auto', padding: '40px 16px', textAlign: 'center' }}>
        <h2 style={{ fontSize: '2em', fontWeight: 800, marginBottom: 12 }}>
          {lives > 0 ? 'рҹҺү Geschafft!' : 'рҹҳў Spiel vorbei'}
        </h2>
        <p style={{ fontSize: '1.2em', marginBottom: 24, color: 'var(--text-dim)' }}>
          Du hast {score} von {exercises.length} Aufgaben richtig gelГ¶st.
        </p>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginBottom: 24, flexWrap: 'wrap' }}>
          <button onClick={onBack} style={{
            padding: '12px 24px',
            borderRadius: 12,
            border: 'none',
            background: 'var(--bg-light)',
            color: 'var(--text)',
            fontWeight: 700,
            fontSize: '1em',
          }}>
            Zur Гңbersicht
          </button>
          <button onClick={() => {
            setExercises(shuffleArray(EXERCISE_GENERATORS[worldId]()));
            setCurrentIdx(0);
            setLives(3);
            setScore(0);
            setSessionDone(false);
            setStreak(0);
          }} style={{
            padding: '12px 24px',
            borderRadius: 12,
            border: 'none',
            background: 'var(--green)',
            color: '#fff',
            fontWeight: 700,
            fontSize: '1em',
          }}>
            Nochmal Гјben
          </button>
        </div>
      </div>
    );
  }

  const ex = exercises[currentIdx];

  return (
    <div style={{ maxWidth: 520, margin: '0 auto', padding: '16px 16px 80px' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <button onClick={onBack} style={{
          background: 'none',
          border: 'none',
          color: 'var(--text-dim)',
          fontSize: '1.3em',
          padding: 4,
        }}>
          вң•
        </button>
        <div style={{ flex: 1 }}>
          <ProgressBar current={currentIdx} total={exercises.length} />
        </div>
        <Hearts lives={lives} />
      </div>

      {/* World title */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        gap: 8,
        marginBottom: 12,
        color: world.color,
        fontWeight: 700,
        fontSize: '0.9em',
      }}>
        <span>{world.icon}</span>
        <span>{world.name}</span>
        <span style={{ color: 'var(--text-dim)', fontWeight: 400 }}>
          вҖ” Aufgabe {currentIdx + 1}/{exercises.length}
        </span>
        {streak >= 3 && <span style={{ marginLeft: 'auto', color: 'var(--gold)' }}>рҹ”Ҙ {streak}</span>}
      </div>

      <RuleDisplay worldId={worldId} currentRule={ex.rule} ruleMode={ruleMode} setRuleMode={setRuleMode} />

      {/* Exercise */}
      {ex.type === 'fillblank' && <FillBlankExercise exercise={ex} onAnswer={handleAnswer} />}
      {ex.type === 'multiplechoice' && <MultipleChoiceExercise exercise={ex} onAnswer={handleAnswer} />}

      <FeedbackBanner correct={feedback} explanation={!feedback && ex.hint ? ex.hint : null} />
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [currentWorld, setCurrentWorld] = useState(null);
  const [progress, setProgress] = useState(() => {
    const p = {};
    WORLDS.forEach(w => { p[w.id] = { completed: 0, total: 0 }; });
    return p;
  });

  if (currentWorld) {
    return (
      <LevelSession
        worldId={currentWorld}
        onBack={() => setCurrentWorld(null)}
        progress={progress}
        setProgress={setProgress}
      />
    );
  }

  return <WorldMap onSelectWorld={setCurrentWorld} progress={progress} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

<script>
// Theme sync: listen for postMessage from parent (Quarto) page
var _themeSetByParent = false;

function setTheme(theme, fromParent) {
  document.documentElement.setAttribute('data-theme', theme);
  if (fromParent) _themeSetByParent = true;
}

// Listen for theme messages from parent
window.addEventListener('message', function(e) {
  if (e.data && (e.data.theme === 'dark' || e.data.theme === 'light')) {
    setTheme(e.data.theme, true);
  }
});

// On load: try multiple detection strategies
(function() {
  function detectParentTheme() {
    try {
      var doc = window.parent.document;
      // 1. data-bs-theme (Bootstrap 5.3+ / Quarto standard)
      var t = doc.documentElement.getAttribute('data-bs-theme');
      if (t === 'dark' || t === 'light') return t;
      // 2. body class .quarto-dark
      if (doc.body && doc.body.classList.contains('quarto-dark')) return 'dark';
      // 3. Check for active darkly stylesheet
      var links = doc.querySelectorAll('link[rel="stylesheet"][href*="darkly"]');
      for (var i = 0; i < links.length; i++) {
        if (!links[i].disabled) return 'dark';
      }
      // 4. Check parent background color as heuristic
      if (doc.body) {
        var bg = window.parent.getComputedStyle(doc.body).backgroundColor;
        var match = bg.match(/\d+/g);
        if (match && match.length >= 3) {
          var brightness = (parseInt(match[0]) * 299 + parseInt(match[1]) * 587 + parseInt(match[2]) * 114) / 1000;
          if (brightness < 128) return 'dark';
        }
      }
    } catch(e) { /* cross-origin, ignore */ }
    return null;
  }

  // Try immediately and with retries
  function tryDetect(attempts) {
    if (_themeSetByParent) return; // parent already sent via postMessage
    var theme = detectParentTheme();
    if (theme) {
      setTheme(theme, false);
    } else if (attempts > 0) {
      setTimeout(function() { tryDetect(attempts - 1); }, 400);
    } else {
      // Final fallback: system preference
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark', false);
      }
    }
  }

  tryDetect(6);
})();

// Watch for system preference changes (only if parent hasn't taken control)
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!_themeSetByParent) {
      setTheme(e.matches ? 'dark' : 'light', false);
    }
  });
}
</script>
