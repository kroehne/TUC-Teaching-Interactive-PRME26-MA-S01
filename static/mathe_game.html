const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================

function MathText({ children, block }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([ref.current]).catch(() => {});
    }
  });
  if (block) return <div ref={ref} className="math-block">{children}</div>;
  return <span ref={ref}>{children}</span>;
}

// ============================================================
// DATA: Worlds, Levels, Exercises
// ============================================================

const WORLDS = [
  { id: 1, name: "Erwartungswert", icon: "🎯", color: "#58cc02", desc: "E(·) – Rechenregeln für Erwartungswerte" },
  { id: 2, name: "Varianz", icon: "📊", color: "#1cb0f6", desc: "Var(·) – Streuungsmaße beherrschen" },
  { id: 3, name: "Kovarianz", icon: "🔗", color: "#ce82ff", desc: "Cov(·,·) – Zusammenhänge berechnen" },
  { id: 4, name: "Regression", icon: "📈", color: "#ff9600", desc: "Bedingte Erwartung E(Y|X)" },
  { id: 5, name: "KTT Grundlagen", icon: "🧱", color: "#ff4b4b", desc: "Y = τ + ε – Klassische Testtheorie" },
  { id: 6, name: "KTT-Modelle", icon: "🏗️", color: "#ffc800", desc: "Parallel, ess. τ-äquivalent, τ-kongenerisch" },

];

// Rule cards (Box F.1 from Steyer & Eid)
const RULES = {
  E1: { id: "E1", label: "(i)", text: "\\(E(\\alpha) = \\alpha\\)", desc: "Der Erwartungswert einer Konstanten ist die Konstante selbst.",
    psychologie: "In der Diagnostik werden häufig Konstanten zu Testwerten addiert (z.\u00A0B. ein Schwierigkeitsparameter oder ein fester Zuschlag bei der Normierung). Um den erwarteten Gesamtwert eines Tests zu berechnen, muss man wissen, dass sich der Erwartungswert einer Konstanten nicht verändert – sie geht einfach als fester Wert in die Berechnung ein. Das ist auch die Grundlage dafür, Intercepts in Regressionsmodellen korrekt zu interpretieren." },
  E2: { id: "E2", label: "(ii)", text: "\\(E(\\alpha X + \\beta Y) = \\alpha E(X) + \\beta E(Y)\\)", desc: "Der Erwartungswert ist linear.",
    psychologie: "In der Psychologie bildet man ständig gewichtete Summen: Skalenwerte als Summe von Items, Composite-Scores aus Subtests, oder gewichtete Prädiktoren in der Regressionsdiagnostik. Die Linearität des Erwartungswerts erlaubt es, den erwarteten Gesamtwert direkt aus den Erwartungswerten der Einzelteile zu berechnen – z.\u00A0B. den erwarteten IQ-Gesamtwert aus den mittleren Subtestwerten. Ohne diese Regel wäre die Interpretation zusammengesetzter Scores nicht möglich." },
  V1: { id: "V1", label: "(iii)", text: "\\(\\text{Var}(X) = E(X^{2}) - [E(X)]^{2}\\)", desc: "Verschiebungssatz der Varianz.",
    psychologie: "Der Verschiebungssatz ist die rechnerische Grundlage, um aus Rohdaten (Summen und Quadratsummen) die Varianz zu bestimmen. In der Forschungsmethodik wird er benötigt, um Streuungsmaße effizient zu berechnen – etwa bei der Varianzanalyse (ANOVA) oder bei der Bestimmung von Effektstärken. In der Diagnostik ist die Varianz die Basis für Reliabilität und Standardmessfehler." },
  V2: { id: "V2", label: "(iv)", text: "\\(\\text{Var}(X) = 0\\), falls \\(X = \\alpha\\) (Konstante)", desc: "Eine Konstante hat keine Streuung.",
    psychologie: "Wenn ein Testwert bei allen Personen identisch ausfällt (z.\u00A0B. ein Item, das jeder richtig löst), hat er keine Varianz und trägt weder zur Reliabilität noch zur Validität bei. Diese Regel erklärt, warum Items mit extremer Schwierigkeit (p ≈ 0 oder p ≈ 1) bei der Testkonstruktion eliminiert werden: Sie liefern keine Information über interindividuelle Unterschiede." },
  V3: { id: "V3", label: "(v)", text: "\\(\\text{Var}(\\alpha X) = \\alpha^{2} \\, \\text{Var}(X)\\)", desc: "Skalierung geht quadratisch in die Varianz ein.",
    psychologie: "Wenn man Testwerte umrechnet (z.\u00A0B. von Rohwerten in IQ-Punkte durch Multiplikation mit einem Faktor), verändert sich die Varianz quadratisch. Das ist entscheidend für die z-Standardisierung: Teilt man durch die Standardabweichung (σ), wird Var(X/σ) = Var(X)/σ² = 1. Auch bei der Gewichtung von Subtests in Testbatterien muss man wissen, dass ein doppeltes Gewicht die Varianz vervierfacht, nicht verdoppelt." },
  V4: { id: "V4", label: "(vi)", text: "\\(\\text{Var}(\\alpha + X) = \\text{Var}(X)\\)", desc: "Verschiebung ändert die Varianz nicht.",
    psychologie: "Ob man zu jedem IQ-Wert 100 addiert oder nicht – die Streuung bleibt gleich. Diese Translationsinvarianz ist grundlegend für die Normierung: Man kann Skalenmittelwerte beliebig verschieben (z.\u00A0B. auf M = 100 oder M = 50), ohne die Reliabilität oder die Differenzierungsfähigkeit des Tests zu verändern. Auch bei der Zentrierung von Prädiktoren in der Regression bleibt die Varianz erhalten." },
  V5: { id: "V5", label: "(vii)", text: "\\(\\text{Var}(\\alpha X + \\beta Y) = \\alpha^{2}\\text{Var}(X) + \\beta^{2}\\text{Var}(Y) + 2\\alpha\\beta\\text{Cov}(X,Y)\\)", desc: "Varianz einer Linearkombination zweier Zufallsvariablen.",
    psychologie: "Dies ist die zentrale Formel für die Diagnostik: Die Varianz eines Gesamttestwertes (Summe aus Subtests) hängt nicht nur von den Einzelvarianzen ab, sondern auch von den Kovarianzen zwischen den Subtests. Deshalb sind hoch korrelierende Items in einer Skala wünschenswert – sie erhöhen die Gesamtvarianz und damit die Reliabilität. In Strukturgleichungsmodellen wird diese Regel verwendet, um die modellimplizierte Kovarianzmatrix abzuleiten." },
  C1: { id: "C1", label: "(viii)", text: "\\(\\text{Cov}(X,Y) = E(XY) - E(X)\\,E(Y)\\)", desc: "Verschiebungssatz der Kovarianz.",
    psychologie: "Die Kovarianz ist das Fundament der Korrelation und damit der gesamten korrelativen Forschung in der Psychologie. Ob Zusammenhang zwischen Intelligenz und Schulleistung, zwischen Therapiedauer und Symptomreduktion, oder zwischen zwei Testitems – stets wird die Kovarianz benötigt. Der Verschiebungssatz ermöglicht die effiziente Berechnung aus Rohdaten (Produktsummen und Einzelsummen)." },
  C2: { id: "C2", label: "(ix)", text: "\\(\\text{Cov}(X,Y) = 0\\), falls \\(X = \\alpha\\) (Konstante)", desc: "Eine Konstante kovariiert mit nichts.",
    psychologie: "Ein Merkmal ohne Variation kann mit nichts zusammenhängen. In der Diagnostik bedeutet das: Ein Item, das alle Personen gleich beantworten, korreliert mit keinem Kriterium und ist für die Vorhersage nutzlos. In der Forschungsmethodik erklärt dies, warum Kovariaten in experimentellen Designs Varianz aufweisen müssen, um als Kontrollvariablen wirksam zu sein." },
  C3: { id: "C3", label: "(x)", text: "\\(\\text{Cov}(\\alpha X, \\beta Y) = \\alpha\\beta \\, \\text{Cov}(X,Y)\\)", desc: "Skalierungsfaktoren werden herausgezogen.",
    psychologie: "Wenn man Testwerte umskaliert (z.\u00A0B. Rohwerte in T-Werte), verändern sich Kovarianzen und Korrelationen vorhersagbar. Diese Regel erklärt, warum die Korrelation (als standardisierte Kovarianz) skalierungsinvariant ist – ein entscheidender Vorteil für den Vergleich von Zusammenhängen über verschiedene Studien hinweg. In der CFA steckt diese Regel in der Beziehung zwischen Faktorladungen und beobachteten Kovarianzen." },
  C4: { id: "C4", label: "(xi)", text: "\\(\\text{Cov}(\\alpha+X,\\, \\beta+Y) = \\text{Cov}(X,Y)\\)", desc: "Verschiebungen ändern die Kovarianz nicht.",
    psychologie: "Ob man die Depressionsskala bei 0 oder bei 50 beginnen lässt – der Zusammenhang mit anderen Variablen ändert sich nicht. Diese Translationsinvarianz der Kovarianz ist wichtig für die Forschungspraxis: Zentrierung von Variablen (z.\u00A0B. um Mittelwert 0) verändert keine Korrelationen und keinen Zusammenhang, was bei der Interpretation von Interaktionseffekten in der Regression relevant ist." },
  C5: { id: "C5", label: "(xii)", text: "\\(\\text{Cov}(\\alpha_{1} X_{1} + \\alpha_{2} X_{2},\\; \\beta_{1} Y_{1} + \\beta_{2} Y_{2}) = \\alpha_{1}\\beta_{1}\\text{Cov}(X_{1},Y_{1}) + \\alpha_{1}\\beta_{2}\\text{Cov}(X_{1},Y_{2}) + \\alpha_{2}\\beta_{1}\\text{Cov}(X_{2},Y_{1}) + \\alpha_{2}\\beta_{2}\\text{Cov}(X_{2},Y_{2})\\)", desc: "Bilinearität der Kovarianz.",
    psychologie: "Diese allgemeine Regel ist der Schlüssel zur Strukturgleichungsmodellierung (SEM): Wenn man wissen will, wie zwei Skalenwerte (jeweils Summen mehrerer Items) zusammenhängen, braucht man alle paarweisen Item-Kovarianzen. In der konfirmatorischen Faktorenanalyse (CFA) wird genau diese Regel benutzt, um aus Faktorladungen und Faktorvarianzen die erwarteten Kovarianzen zwischen beobachteten Variablen abzuleiten – das ist die modellimplizierte Kovarianzmatrix Σ(θ)." },
};

// KTT rules
const KTT_RULES = {
  K1: { id: "K1", label: "KTT-1", text: "\\(Y_{i} = \\tau_{i} + \\varepsilon_{i}\\)", desc: "Zerlegung in wahren Wert und Messfehler, wobei \\(\\tau_{i} := E(Y_{i} | p_{U})\\)",
    psychologie: "Jedes diagnostische Testergebnis enthält Messungenauigkeit. Ein IQ-Wert von 112 bedeutet nicht, dass die ‚wahre' Intelligenz exakt 112 ist – ein Teil ist Messfehler (Tagesform, Rateeffekte, Ablenkung). Die KTT-Zerlegung ist das mathematische Fundament, um Messfehler zu quantifizieren und Konfidenzintervalle um Testwerte zu bilden, wie sie in jedem Befundbericht gefordert werden." },
  K2: { id: "K2", label: "KTT-2", text: "\\(E(\\varepsilon_{i}) = 0\\)", desc: "Der Messfehler hat Erwartungswert 0.",
    psychologie: "Im Mittel misst ein Test korrekt – Messfehler sind unsystematisch. Das bedeutet: Würde man denselben IQ-Test einer Person unendlich oft vorgeben, wäre der Durchschnitt aller Messwerte gleich dem wahren Wert. Systematische Verzerrungen (z.\u00A0B. kulturelle Bias) sind dagegen kein Messfehler im Sinne der KTT, sondern ein Validitätsproblem." },
  K3: { id: "K3", label: "KTT-3", text: "\\(\\text{Cov}(\\varepsilon_{i}, \\tau_{j}) = 0\\)", desc: "Messfehler und wahrer Wert sind unkorreliert.",
    psychologie: "Ob jemand tatsächlich hoch oder niedrig auf einem Merkmal steht, sagt nichts über die Größe des Messfehlers. Für die Diagnostik heißt das: Der Standardmessfehler gilt für alle Personen gleichermaßen – ob hochbegabt oder durchschnittlich. (Achtung: In der Item-Response-Theorie wird diese Annahme aufgeweicht, dort variiert die Messgenauigkeit mit dem Fähigkeitsniveau.)" },
  K4: { id: "K4", label: "KTT-4", text: "\\(\\text{Var}(Y_{i}) = \\text{Var}(\\tau_{i}) + \\text{Var}(\\varepsilon_{i})\\)", desc: "Varianzzerlegung in wahre Varianz und Fehlervarianz.",
    psychologie: "Die beobachteten Unterschiede zwischen Personen in einem Test bestehen teils aus echten Unterschieden (wahre Varianz) und teils aus Messrauschen (Fehlervarianz). Die zentrale Frage der Diagnostik ist: Wie groß ist der Anteil wahrer Varianz? Je größer dieser Anteil, desto besser differenziert der Test zwischen Personen – desto reliabler ist er." },
  K5: { id: "K5", label: "KTT-5", text: "\\(\\text{Rel}(Y_{i}) = \\frac{\\text{Var}(\\tau_{i})}{\\text{Var}(Y_{i})}\\)", desc: "Reliabilität als Anteil wahrer Varianz.",
    psychologie: "Die Reliabilität ist das wichtigste Gütekriterium in der psychologischen Diagnostik. Sie gibt an, welcher Anteil der Testvarianz auf echte Merkmalsunterschiede zurückgeht. Ein Test mit Rel = 0.90 bedeutet: 90 % der Varianz ist ‚echt', nur 10 % ist Messfehler. Klinisch relevante Entscheidungen (z.\u00A0B. Diagnose einer Lernbehinderung) erfordern typischerweise Rel ≥ 0.90. Die Reliabilität bestimmt auch die Breite des Konfidenzintervalls um einen individuellen Messwert: SE = SD · √(1 − Rel)." },
  K6: { id: "K6", label: "Parallel", text: "\\(\\text{Var}(\\varepsilon_{1}) = \\text{Var}(\\varepsilon_{2}) = \\ldots\\) und \\(\\tau_{1} = \\tau_{2} = \\ldots\\)", desc: "Parallele Messungen: gleiche wahre Werte und gleiche Fehlervarianzen.",
    psychologie: "Paralleltest-Reliabilität ist der klassische Reliabilitätskoeffizient: Man gibt zwei parallele Testformen vor und korreliert die Ergebnisse. In der Praxis ist diese Anforderung sehr streng – zwei Tests müssen exakt das Gleiche messen mit gleicher Genauigkeit. Deshalb wird Paralleltest-Reliabilität selten direkt bestimmt, aber das Modell ist die theoretische Grundlage für die Retest-Reliabilität und für die Erkenntnis, dass Cronbachs α die Reliabilität unterschätzt, wenn Tests nicht parallel sind." },
  K7: { id: "K7", label: "Ess. τ-äquiv.", text: "\\(\\tau_{i} = \\eta + \\lambda_{i}\\) mit \\(\\lambda_{i}\\) Konstanten", desc: "Ess. τ-äquivalent: Die wahren Werte sind Translationen eines gemeinsamen η. Daraus folgt \\(\\text{Cov}(Y_{i},Y_{j}) = \\text{Var}(\\eta)\\) für \\(i \\neq j\\).",
    psychologie: "Essentiell τ-äquivalente Items messen dasselbe Merkmal η, dürfen aber unterschiedliche Schwierigkeiten (λᵢ) und unterschiedliche Fehlervarianzen haben. Das ist das Modell, unter dem Cronbachs α als Reliabilitätsschätzer exakt gilt. In der Testkonstruktion heißt das: Alle Items einer Skala sollen dasselbe Konstrukt messen, dürfen sich aber in der Schwierigkeit unterscheiden – eine realistische und häufig geprüfte Annahme. Wenn diese Annahme verletzt ist (z.\u00A0B. bei heterogenen Skalen), unterschätzt α die Reliabilität." },
  K8: { id: "K8", label: "τ-kongenerisch", text: "\\(\\tau_{i} = \\alpha_{i} + \\beta_{i} \\eta\\) mit \\(\\alpha_{i}, \\beta_{i}\\) Konstanten", desc: "τ-kongenerisch: Die wahren Werte sind lineare Funktionen eines gemeinsamen η. Daraus folgt \\(\\text{Cov}(Y_{i},Y_{j}) = \\beta_{i}\\beta_{j}\\text{Var}(\\eta)\\) für \\(i \\neq j\\).",
    psychologie: "Das τ-kongenerische Modell ist das realistischste und zugleich das allgemeinste KTT-Modell: Items dürfen unterschiedlich stark auf das Konstrukt laden (βᵢ ≠ βⱼ). Es ist mathematisch identisch mit dem Ein-Faktor-Modell der konfirmatorischen Faktorenanalyse. Cronbachs α ist unter diesem Modell nur eine Untergrenze der Reliabilität – besser wäre McDonalds ω, das die unterschiedlichen Ladungen berücksichtigt. In der modernen Diagnostik wird deshalb zunehmend ω statt α berichtet." },
};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Shuffle multiple-choice options and update correct index
function shuffleMC(options, correctIndex) {
  const indexed = options.map((opt, i) => ({ opt, isCorrect: i === correctIndex }));
  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }
  return {
    options: indexed.map(x => x.opt),
    correct: indexed.findIndex(x => x.isCorrect),
  };
}

// World 1: Erwartungswert
function generateW1Exercises() {
  const exercises = [];

  // Level 1: E(α) = α
  exercises.push({
    type: "fillblank",
    question: "Sei \\(\\alpha = 5\\) eine Konstante. Berechne:",
    prompt: "\\(E(5) = ?\\)",
    answer: "5",
    hint: "Regel (i): \\(E(\\alpha) = \\alpha\\)",
    rule: "E1",
    level: 1,
  });

  exercises.push({
    type: "multiplechoice",
    question: "Welche Regel wird angewendet, um \\(E(7)\\) zu berechnen?",
    options: ["\\(E(\\alpha) = \\alpha\\)", "\\(E(\\alpha X) = \\alpha E(X)\\)", "\\(E(X+Y) = E(X)+E(Y)\\)", "\\(\\text{Var}(\\alpha) = 0\\)"],
    correct: 0,
    rule: "E1",
    level: 1,
  });

  const c1 = randInt(2, 9);
  exercises.push({
    type: "fillblank",
    question: `Sei \\(\\alpha = ${c1}\\) eine Konstante.`,
    prompt: `\\(E(${c1}) = ?\\)`,
    answer: `${c1}`,
    hint: "Regel (i): Der Erwartungswert einer Konstanten ist die Konstante selbst.",
    rule: "E1",
    level: 1,
  });

  // Level 2: Linearität E(αX + βY)
  const a = randInt(2, 5), b = randInt(2, 5);
  const ex = randInt(1, 10), ey = randInt(1, 10);
  exercises.push({
    type: "fillblank",

      "Bei der CFA werden die Faktorladungen vorab festgelegt (konfirmatorisch)",
      "CFA benötigt mehr Variablen",
      "EFA verwendet keine latenten Variablen",
      "CFA ist weniger restriktiv"
    ],
    correct: 0,
    rule: null,
    psychologie: "Die CFA ist das Standardverfahren zur Überprüfung der Konstruktvalidität psychologischer Tests. Wenn ein neuer Fragebogen zur Erfassung von Achtsamkeit entwickelt wird, prüft die CFA, ob die Items tatsächlich die postulierten Faktoren (z.\u00A0B. ‚Beobachten', ‚Beschreiben', ‚Nicht-Reagieren') messen. Ohne CFA gibt es keine belastbare empirische Evidenz für die Faktorenstruktur eines Instruments.",
    level: 1,
  });

  exercises.push({
    type: "multiplechoice",
    question: "Im CFA-Modell \\(Y_{i} = \\lambda_{i}\\eta + \\varepsilon_{i}\\): Was ist \\(\\eta\\)?",
    options: [
      "Eine latente (nicht beobachtbare) Variable",
      "Der Mittelwert der \\(Y_{i}\\)",
      "Der Messfehler",
      "Eine beobachtete Variable"
    ],
    correct: 0,
    rule: null,
    psychologie: "Latente Variablen sind das Kernkonzept der psychologischen Diagnostik: Intelligenz, Extraversion, Depression – all das sind Konstrukte, die nicht direkt beobachtbar sind, sondern nur über Indikatoren (Items, Subtests) erschlossen werden. Die CFA formalisiert genau diese Idee: η ist das latente Konstrukt, die Yᵢ sind die beobachteten Antworten, und die λᵢ geben an, wie gut jedes Item das Konstrukt misst.",
    level: 1,
  });

  exercises.push({
    type: "fillblank",
    question: "CFA: \\(Y_{1} = \\lambda_{1}\\eta + \\varepsilon_{1}\\), \\(Y_{2} = \\lambda_{2}\\eta + \\varepsilon_{2}\\). \\(\\text{Var}(\\eta) = 1\\) (standardisiert). \\(\\lambda_{1} = 0.8\\), \\(\\lambda_{2} = 0.6\\).",
    prompt: "\\(\\text{Cov}(Y_{1},Y_{2}) = \\lambda_{1}\\cdot\\lambda_{2}\\cdot\\text{Var}(\\eta) = 0.8 \\cdot 0.6 \\cdot 1 = ?\\)",
    answer: "0.48",
    hint: "0.8 · 0.6 · 1 = 0.48",
    rule: "C5",
    level: 2,
  });

  exercises.push({
    type: "fillblank",
    question: "CFA: \\(\\lambda_{1} = 0.8\\), \\(\\text{Var}(\\eta) = 1\\), \\(\\text{Var}(\\varepsilon_{1}) = 0.36\\). Berechne \\(\\text{Var}(Y_{1})\\):",
    prompt: "\\(\\text{Var}(Y_{1}) = \\lambda_{1}^{2}\\cdot\\text{Var}(\\eta) + \\text{Var}(\\varepsilon_{1}) = ?\\)",
    answer: "1",
    hint: "0.64·1 + 0.36 = 1.00",
    rule: "V5",
    level: 2,
  });

  exercises.push({
    type: "fillblank",
    question: "\\(\\text{Rel}(Y_{1})\\) im CFA-Modell mit \\(\\lambda_{1}=0.8\\), \\(\\text{Var}(\\eta)=1\\), \\(\\text{Var}(Y_{1})=1\\):",
    prompt: "\\(\\text{Rel}(Y_{1}) = \\frac{\\lambda_{1}^{2}\\cdot\\text{Var}(\\eta)}{\\text{Var}(Y_{1})} = ?\\)",
    answer: "0.64",
    hint: "0.8²·1/1 = 0.64",
    rule: "K5",
    level: 3,
  });

  exercises.push({
    type: "fillblank",
    question: "Gegeben: \\(\\lambda_{1} = 0.7\\), \\(\\lambda_{2} = 0.9\\), \\(\\text{Var}(\\eta) = 1\\) (standardisiert):",
    prompt: "\\(\\text{Cov}(Y_{1},Y_{2}) = 0.7 \\cdot 0.9 \\cdot 1 = ?\\)",
    answer: "0.63",
    hint: "0.7 · 0.9 = 0.63",
    rule: "C5",
    psychologie: "Die Itemreliabilität aus der CFA (λ² bei standardisiertem η) zeigt, wie gut ein einzelnes Item das Konstrukt misst. λ₁ = 0.8 bedeutet: 64 % der Itemvarianz ist wahre Varianz. In der Testkonstruktion werden Items mit zu geringer Ladung (z.\u00A0B. λ < 0.4) entfernt, weil sie mehr Messfehler als Konstruktinformation enthalten. McDonalds ω als CFA-basierte Reliabilität nutzt genau diese Ladungen, um die Reliabilität des Gesamtscores zu bestimmen.",
    level: 3,
  });

  return exercises;
}

const RAW_GENERATORS = {
  1: generateW1Exercises,
  2: generateW2Exercises,
  3: generateW3Exercises,
  4: generateW4Exercises,
  5: generateW5Exercises,
  6: generateW6Exercises,
  7: generateW7Exercises,
  8: generateW8Exercises,
  9: generateW9Exercises,
};

// Wrap generators to auto-shuffle MC options
const EXERCISE_GENERATORS = Object.fromEntries(
  Object.entries(RAW_GENERATORS).map(([k, gen]) => [k, () => {
    return gen().map(ex => {
      if (ex.type === "multiplechoice" && ex.options && ex.correct !== undefined) {
        const { options, correct } = shuffleMC(ex.options, ex.correct);
        return { ...ex, options, correct };
      }
      return ex;
    });
  }])
);

function RuleCard({ rule }) {
  const [showPsych, setShowPsych] = useState(false);
  if (!rule) return null;
  const r = RULES[rule] || KTT_RULES[rule];
  if (!r) return null;
  return (
    <div style={{
      background: 'linear-gradient(135deg, var(--rule-bg-from), var(--rule-bg-to))',
      border: '1px solid var(--rule-border)',
      borderRadius: 12,
      padding: '12px 16px',
      marginBottom: 12,
      fontSize: '0.9em',
    }}>
      <div style={{ color: 'var(--blue)', fontWeight: 700, marginBottom: 4 }}>
        Regel {r.label}
      </div>
      <MathText>{r.text}</MathText>
      <div style={{ color: 'var(--text-dim)', fontSize: '0.85em' }}>{r.desc}</div>
      {r.psychologie && (
        <div style={{ marginTop: 8 }}>
          <button onClick={() => setShowPsych(!showPsych)} style={{
            background: 'none',
            border: 'none',
            color: 'var(--orange)',
            fontSize: '0.85em',
            fontWeight: 600,
            cursor: 'pointer',
            padding: 0,
            textDecoration: 'underline',
            textDecorationStyle: 'dotted',
          }}>
            🧠 {showPsych ? 'Anwendung ausblenden' : 'Wozu brauche ich das als Psychologe/in?'}
          </button>
          {showPsych && (
            <div style={{
              marginTop: 8,
              padding: '10px 14px',
              background: 'var(--hint-bg)',
              border: '1px solid var(--hint-border)',
              borderRadius: 8,

}

function ProgressBar({ current, total }) {
  const pct = total > 0 ? (current / total) * 100 : 0;
  return (
    <div style={{
      width: '100%',
      height: 12,
      background: 'var(--bg-light)',
      borderRadius: 6,
      overflow: 'hidden',
      marginBottom: 16,
    }}>
      <div style={{
        width: `${pct}%`,
        height: '100%',
        background: 'var(--green)',
        borderRadius: 6,
        transition: 'width 0.4s ease',
      }} />
    </div>
  );
}

function Hearts({ lives }) {
  return (
    <div style={{ display: 'flex', gap: 4 }}>
      {[1,2,3].map(i => (
        <span key={i} style={{ fontSize: 20, opacity: i <= lives ? 1 : 0.2 }}>❤️</span>
      ))}
    </div>
  );
}

function PsychRelevance({ exercise }) {
  const [show, setShow] = useState(false);
  // Get psychologie text: either directly from exercise, or from linked rule
  let text = exercise.psychologie;
  if (!text && exercise.rule) {
    const r = RULES[exercise.rule] || KTT_RULES[exercise.rule];
    if (r) text = r.psychologie;
  }
  if (!text) return null;
  return (
    <div style={{ marginTop: 10, marginBottom: 4 }}>
      <button onClick={() => setShow(!show)} style={{
        background: 'none',
        border: 'none',
        color: 'var(--purple)',
        fontSize: '0.85em',
        fontWeight: 600,
        cursor: 'pointer',
        padding: 0,
        textDecoration: 'underline',
        textDecorationStyle: 'dotted',
      }}>
        🧠 {show ? 'Anwendung ausblenden' : 'Wozu brauche ich das als Psychologe/in?'}
      </button>
      {show && (
        <div style={{
          marginTop: 8,
          padding: '10px 14px',
          background: 'var(--psych-bg)',
          border: '1px solid var(--psych-border)',
          borderRadius: 8,
          fontSize: '0.88em',
          lineHeight: 1.6,
          color: 'var(--text)',
        }}>
          {text}
        </div>
      )}
    </div>
  );
}

function FillBlankExercise({ exercise, onAnswer }) {
  const [value, setValue] = useState('');
  const [showHint, setShowHint] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, [exercise]);

  const handleSubmit = () => {
    if (!value.trim()) return;
    const correct = value.trim().replace(',', '.') === exercise.answer.replace(',', '.');
    onAnswer(correct);
    setValue('');
    setShowHint(false);
  };

  return (
    <div>
      <div style={{ fontSize: '1.1em', marginBottom: 8, lineHeight: 1.6 }}><MathText>{exercise.question}</MathText></div>
      <MathText block>{exercise.prompt.replace('?', '\\,\\boxed{\\phantom{00}}')}</MathText>
      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
        <input
          ref={inputRef}
          type="text"
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleSubmit()}
          placeholder="Deine Antwort..."
          style={{
            flex: 1,
            padding: '12px 16px',
            borderRadius: 12,
            border: '2px solid var(--input-border)',
            background: 'var(--input-bg)',
            color: 'var(--text)',
            fontSize: '1.1em',
            fontFamily: "'Cambria Math', Georgia, serif",
            outline: 'none',
          }}
        />
        <button onClick={handleSubmit} disabled={!value.trim()} style={{
          padding: '12px 24px',
          borderRadius: 12,
          border: 'none',
          background: value.trim() ? 'var(--green)' : 'var(--bg-light)',
          color: '#fff',
          fontWeight: 700,
          fontSize: '1em',
          transition: 'background 0.2s',
        }}>
          Prüfen
        </button>
      </div>
      {!showHint && (
        <button onClick={() => setShowHint(true)} style={{
          marginTop: 12,
          background: 'none',
          border: 'none',
          color: 'var(--text-dim)',
          fontSize: '0.85em',
          textDecoration: 'underline',
        }}>
          💡 Hinweis anzeigen
        </button>
      )}
      {showHint && (
        <div style={{
          marginTop: 12,
          padding: '10px 14px',
          background: 'var(--hint-bg)',
          border: '1px solid var(--hint-border)',
          borderRadius: 8,
          fontSize: '0.9em',
          color: 'var(--orange)',
        }}>
          💡 <MathText>{exercise.hint}</MathText>
        </div>
      )}
    </div>
  );
}

function MultipleChoiceExercise({ exercise, onAnswer }) {
  const [selected, setSelected] = useState(null);

  const handleSelect = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    setTimeout(() => {
      onAnswer(idx === exercise.correct);
      setSelected(null);
    }, 800);
  };

  return (
    <div>
      <div style={{ fontSize: '1.1em', marginBottom: 16, lineHeight: 1.6 }}><MathText>{exercise.question}</MathText></div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {exercise.options.map((opt, idx) => {
          let bg = 'var(--bg-light)';
          let border = '2px solid transparent';
          if (selected !== null) {
            if (idx === exercise.correct) { bg = 'rgba(88,204,2,0.18)'; border = '2px solid var(--green)'; }
            else if (idx === selected && idx !== exercise.correct) { bg = 'rgba(255,75,75,0.18)'; border = '2px solid var(--red)'; }
          }
          return (
            <button key={idx} onClick={() => handleSelect(idx)} style={{
              padding: '14px 18px',
              borderRadius: 12,
              background: bg,
              border: border,
              color: 'var(--text)',
              textAlign: 'left',
              fontSize: '1em',
              transition: 'all 0.2s',
              cursor: selected !== null ? 'default' : 'pointer',
            }}>
              <span style={{ color: 'var(--text-dim)', marginRight: 10, fontWeight: 700 }}>
                {['A', 'B', 'C', 'D'][idx]}
              </span>
              <MathText>{opt}</MathText>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function FeedbackBanner({ correct, explanation }) {
  if (correct === null) return null;
  return (
    <div style={{
      position: 'fixed',
      bottom: 0,
      left: 0,
      right: 0,
      padding: '16px 24px',
      background: correct ? 'var(--feedback-correct-bg)' : 'var(--feedback-wrong-bg)',
      color: '#fff',
      fontWeight: 700,
      fontSize: '1.1em',
      zIndex: 100,
      animation: 'slideUp 0.3s ease',
      display: 'flex',
      alignItems: 'center',
      gap: 12,
    }}>
      <span style={{ fontSize: '1.5em' }}>{correct ? '✅' : '❌'}</span>
      <span>{correct ? 'Richtig!' : 'Leider falsch.'}</span>
      {!correct && explanation && (
        <span style={{ fontWeight: 400, fontSize: '0.9em', marginLeft: 8 }}>{explanation}</span>
      )}
    </div>
  );
}

function WorldMap({ onSelectWorld, progress }) {
  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '24px 16px' }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
        {WORLDS.map((w, idx) => {
          const p = progress[w.id] || { completed: 0, total: 0 };
          const done = p.completed >= p.total && p.total > 0;
          return (
            <button
              key={w.id}
              onClick={() => onSelectWorld(w.id)}
              style={{
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: 8,
                padding: '20px 12px',
                borderRadius: 16,
                border: done ? `2px solid ${w.color}` : '2px solid transparent',
                background: 'var(--bg-card)',
                cursor: 'pointer',
                textAlign: 'center',
                transition: 'all 0.2s',
              }}
            >
              <div style={{
                width: 52, height: 52,
                borderRadius: '50%',
                background: done ? w.color : 'var(--bg-light)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontSize: '1.5em',
                flexShrink: 0,
              }}>
                {done ? '⭐' : w.icon}
              </div>
              <div style={{ width: '100%' }}>
                <div style={{ fontWeight: 700, fontSize: '0.95em' }}>
                  {w.name}
                </div>
                <div style={{ fontSize: '0.75em', color: 'var(--text-dim)', marginTop: 2 }}>{w.desc}</div>
                {p.total > 0 && (
                  <div style={{
                    marginTop: 6,
                    height: 6,
                    background: 'var(--bg)',
                    borderRadius: 3,
                    overflow: 'hidden',
                  }}>
                    <div style={{
                      width: `${(p.completed / p.total) * 100}%`,
                      height: '100%',
                      background: w.color,
                      borderRadius: 3,
                    }} />
                  </div>
                )}
              </div>
              {done && <span style={{ fontSize: '1.2em', color: w.color }}>✓</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function getRulesForWorld(worldId) {
  if (worldId <= 1) return [RULES.E1, RULES.E2];
  if (worldId === 2) return [RULES.V1, RULES.V2, RULES.V3, RULES.V4, RULES.V5];
  if (worldId === 3) return [RULES.C1, RULES.C2, RULES.C3, RULES.C4, RULES.C5];
  if (worldId <= 4) return [...Object.values(RULES)];
  return [...Object.values(RULES), ...Object.values(KTT_RULES)];
}

function RuleDisplay({ worldId, currentRule, ruleMode, setRuleMode }) {
  const allRules = getRulesForWorld(worldId);

  return (
    <div style={{ marginBottom: 16 }}>
      <select
        value={ruleMode}
        onChange={e => setRuleMode(e.target.value)}
        style={{
          background: 'var(--bg-light)',
          border: '1px solid var(--card-border)',
          color: 'var(--text)',
          padding: '8px 14px',
          borderRadius: 8,
          fontSize: '0.85em',
          fontWeight: 600,
          cursor: 'pointer',
          appearance: 'auto',
        }}
      >
        <option value="current">🎯 passende Regel einblenden</option>
        <option value="all">📖 alle Regeln einblenden</option>
        <option value="none">Regeln ausblenden</option>
      </select>
      {ruleMode === 'current' && currentRule && (
        <div style={{ marginTop: 8 }}>
          <RuleCard rule={currentRule} />
        </div>
      )}
      {ruleMode === 'all' && (
        <div style={{ marginTop: 8, maxHeight: 300, overflowY: 'auto', paddingRight: 8 }}>
          {allRules.map(r => <RuleCard key={r.id} rule={r.id} />)}
        </div>
      )}
    </div>
  );
}

function LevelSession({ worldId, onBack, progress, setProgress }) {
  const [exercises, setExercises] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [lives, setLives] = useState(3);
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [sessionDone, setSessionDone] = useState(false);
  const [streak, setStreak] = useState(0);
  const [ruleMode, setRuleMode] = useState('current');

  useEffect(() => {
    const gen = EXERCISE_GENERATORS[worldId];
    if (gen) {
      setExercises(shuffleArray(gen()));
    }
  }, [worldId]);

  const handleAnswer = useCallback((correct) => {
    setFeedback(correct);
    if (correct) {
      setScore(s => s + 1);
      setStreak(s => s + 1);
    } else {
      setLives(l => l - 1);
      setStreak(0);
    }
    setTimeout(() => {
      setFeedback(null);
      if (!correct && lives <= 1) {
        setSessionDone(true);
        return;
      }
      if (currentIdx + 1 >= exercises.length) {
        setSessionDone(true);
        setProgress(p => ({
          ...p,
          [worldId]: { completed: score + (correct ? 1 : 0), total: exercises.length }
        }));
        return;
      }
      setCurrentIdx(i => i + 1);
    }, 2000);
  }, [currentIdx, exercises.length, lives, score, worldId, setProgress]);

  const world = WORLDS.find(w => w.id === worldId);
  if (!world) return <div>Loading...</div>;

  if (!exercises.length) return <div>Generating exercises...</div>;

  if (sessionDone) {
    return (
      <div style={{ maxWidth: 520, margin: '0 auto', padding: '40px 16px', textAlign: 'center' }}>
        <h2 style={{ fontSize: '2em', fontWeight: 800, marginBottom: 12 }}>
          {lives > 0 ? '🎉 Geschafft!' : '😢 Spiel vorbei'}
        </h2>
        <p style={{ fontSize: '1.2em', marginBottom: 24, color: 'var(--text-dim)' }}>
          Du hast {score} von {exercises.length} Aufgaben richtig gelöst.
        </p>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginBottom: 24, flexWrap: 'wrap' }}>
          <button onClick={onBack} style={{
            padding: '12px 24px',
            borderRadius: 12,
            border: 'none',
            background: 'var(--bg-light)',
            color: 'var(--text)',
            fontWeight: 700,
            fontSize: '1em',
          }}>
            Zur Übersicht
          </button>
          <button onClick={() => {
            setExercises(shuffleArray(EXERCISE_GENERATORS[worldId]()));
            setCurrentIdx(0);
            setLives(3);
            setScore(0);
            setSessionDone(false);
            setStreak(0);
          }} style={{
            padding: '12px 24px',
            borderRadius: 12,
            border: 'none',
            background: 'var(--green)',
            color: '#fff',
            fontWeight: 700,
            fontSize: '1em',
          }}>
            Nochmal üben
          </button>
        </div>
      </div>
    );
  }

  const ex = exercises[currentIdx];

  return (
    <div style={{ maxWidth: 520, margin: '0 auto', padding: '16px 16px 80px' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <button onClick={onBack} style={{
          background: 'none',
          border: 'none',
          color: 'var(--text-dim)',
          fontSize: '1.3em',
          padding: 4,
        }}>
          ✕
        </button>
        <div style={{ flex: 1 }}>
          <ProgressBar current={currentIdx} total={exercises.length} />
        </div>
        <Hearts lives={lives} />
      </div>

      {/* World title */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        gap: 8,
        marginBottom: 12,
        color: world.color,
        fontWeight: 700,
        fontSize: '0.9em',
      }}>
        <span>{world.icon}</span>
        <span>{world.name}</span>
        <span style={{ color: 'var(--text-dim)', fontWeight: 400 }}>
          — Aufgabe {currentIdx + 1}/{exercises.length}
        </span>
        {streak >= 3 && <span style={{ marginLeft: 'auto', color: 'var(--gold)' }}>🔥 {streak}</span>}
      </div>

      <RuleDisplay worldId={worldId} currentRule={ex.rule} ruleMode={ruleMode} setRuleMode={setRuleMode} />

      {/* Exercise */}
      {ex.type === 'fillblank' && <FillBlankExercise exercise={ex} onAnswer={handleAnswer} />}
      {ex.type === 'multiplechoice' && <MultipleChoiceExercise exercise={ex} onAnswer={handleAnswer} />}

      <FeedbackBanner correct={feedback} explanation={!feedback && ex.hint ? ex.hint : null} />
    </div>
  );
}

function App() {
  const [currentWorld, setCurrentWorld] = useState(null);
  const [progress, setProgress] = useState(() => {
    const p = {};
    WORLDS.forEach(w => { p[w.id] = { completed: 0, total: 0 }; });
    return p;
  });

  if (currentWorld) {
    return (
      <LevelSession
        worldId={currentWorld}
        onBack={() => setCurrentWorld(null)}
        progress={progress}
        setProgress={setProgress}
      />
    );
  }

  return <WorldMap onSelectWorld={setCurrentWorld} progress={progress} />;
}

root.render(<App />);

  if (fromParent) _themeSetByParent = true;

// Listen for theme messages from parent
window.addEventListener('message', function(e) {

// On load: try multiple detection strategies
(function() {
  function detectParentTheme() {
    try {
      var doc = window.parent.document;
      // 1. data-bs-theme (Bootstrap 5.3+ / Quarto standard)
      var t = doc.documentElement.getAttribute('data-bs-theme');
      if (t === 'dark' || t === 'light') return t;
      // 2. body class .quarto-dark
      if (doc.body && doc.body.classList.contains('quarto-dark')) return 'dark';
      // 3. Check for active darkly stylesheet
      var links = doc.querySelectorAll('link[rel="stylesheet"][href*="darkly"]');
      for (var i = 0; i < links.length; i++) {
        if (!links[i].disabled) return 'dark';
      }
      // 4. Check parent background color as heuristic
      if (doc.body) {
        var bg = window.parent.getComputedStyle(doc.body).backgroundColor;
        var match = bg.match(/\d+/g);
        if (match && match.length >= 3) {
          var brightness = (parseInt(match[0]) * 299 + parseInt(match[1]) * 587 + parseInt(match[2]) * 114) / 1000;
          if (brightness < 128) return 'dark';
        }
      }
    } catch(e) { /* cross-origin, ignore */ }
    return null;
  }

  // Try immediately and with retries
  function tryDetect(attempts) {
    if (_themeSetByParent) return; // parent already sent via postMessage
    var theme = detectParentTheme();
    if (theme) {
      setTheme(theme, false);
    } else if (attempts > 0) {
      setTimeout(function() { tryDetect(attempts - 1); }, 400);
    } else {
      // Final fallback: system preference
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark', false);
      }
    }
  }

  tryDetect(6);
})();

// Watch for system preference changes (only if parent hasn't taken control)
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!_themeSetByParent) {
      setTheme(e.matches ? 'dark' : 'light', false);
    }
  });
}
</script>
