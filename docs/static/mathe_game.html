<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// MathText Component for MathJax rendering
// ============================================================

function MathText({ children, text, block }) {
  const ref = useRef(null);
  const content = text || children;
  useEffect(() => {
    if (ref.current && window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetPromise([ref.current]).catch(() => {});
    }
  });
  if (block) return <div ref={ref} className="math-block">{content}</div>;
  return <span ref={ref}>{content}</span>;
}

// ============================================================
// DATA: Worlds, Levels, Exercises
// ============================================================

const WORLDS = [
  { id: 1, name: "Erwartungswert", icon: "🎯", color: "#58cc02", desc: "E(·) – Rechenregeln für Erwartungswerte" },
  { id: 2, name: "Varianz", icon: "📊", color: "#1cb0f6", desc: "Var(·) – Streuungsmaße beherrschen" },
  { id: 3, name: "Kovarianz & Korrelation", icon: "🔗", color: "#ce82ff", desc: "Cov(·,·) und Kor(·,·) – Zusammenhänge berechnen" },
  { id: 4, name: "Regression Grundlagen", icon: "📈", color: "#ff9600", desc: "Lineare und multiple Regression" },
  { id: 5, name: "Bedingte Erwartung", icon: "🔮", color: "#ff9600", desc: "E(Y|X) – Regression als bedingte Erwartung" },
  { id: 6, name: "Rechenregeln Regression", icon: "📐", color: "#ff9600", desc: "Eigenschaften von E(Y|X) und ε" },
  { id: 7, name: "KTT Grundlagen", icon: "🧱", color: "#ff4b4b", desc: "Y = τ + ε – Klassische Testtheorie" },
  { id: 8, name: "KTT-Modelle", icon: "🏗️", color: "#ffc800", desc: "Parallel, ess. τ-äquivalent, τ-kongenerisch" },
  { id: 9, name: "Pfaddiagramme", icon: "🔀", color: "#58cc02", desc: "Pfaddiagramme → Gleichungen" },
  { id: 10, name: "Impl. Kovarianzmatrix", icon: "🧮", color: "#1cb0f6", desc: "Modellimpliierte Σ berechnen" },
  { id: 11, name: "CFA", icon: "🔬", color: "#ce82ff", desc: "Konfirmatorische Faktorenanalyse" },
];

// Definition rules (Box F.1 Definitionen + Box G.1 Definitionen)
const DEF_RULES = {
  // Box F definitions
  DEF_E: { id: "DEF_E", label: "Def. E(X)", text: "\\(E(X) := \\sum_{i=1}^{n} x_i \\cdot P(X = x_i)\\)", desc: "Der Erwartungswert ist der gewichtete Durchschnitt aller möglichen Werte, gewichtet mit ihren Wahrscheinlichkeiten.",
    psychologie: "Der Erwartungswert ist das zentrale Maß für die ‚typische' Ausprägung eines Merkmals. In der Diagnostik ist er der Populationsmittelwert eines Tests – z.\u00A0B. der mittlere IQ von 100. In der klinischen Forschung vergleicht man Erwartungswerte zwischen Gruppen (z.\u00A0B. Therapie- vs. Kontrollgruppe), um Behandlungseffekte nachzuweisen. Ohne den Erwartungswert gibt es kein Maß für den ‚durchschnittlichen' Therapieeffekt." },
  DEF_Cov: { id: "DEF_Cov", label: "Def. Cov", text: "\\(\\text{Cov}(X,Y) := E\\bigl[(X - E(X))(Y - E(Y))\\bigr]\\)", desc: "Die Kovarianz misst den linearen Zusammenhang zweier Zufallsvariablen.",
    psychologie: "Die Kovarianz quantifiziert, ob zwei psychologische Merkmale systematisch zusammenhängen. Positive Kovarianz zwischen Intelligenz und Schulleistung bedeutet: Personen mit überdurchschnittlicher Intelligenz zeigen tendenziell überdurchschnittliche Schulleistung. Die Kovarianz ist die Grundlage für Korrelation, Regression und Faktorenanalyse – praktisch alle multivariaten Methoden der Psychologie bauen darauf auf." },
  DEF_Var: { id: "DEF_Var", label: "Def. Var", text: "\\(\\text{Var}(X) := E\\bigl[(X - E(X))^{2}\\bigr] = \\text{Cov}(X,X)\\)", desc: "Die Varianz misst die Streuung einer Zufallsvariablen um ihren Erwartungswert.",
    psychologie: "Die Varianz zeigt, wie stark sich Personen in einem Merkmal unterscheiden. Ohne interindividuelle Unterschiede (Varianz = 0) kann man weder Zusammenhänge finden noch Vorhersagen machen. In der Diagnostik bestimmt die Varianz, ob ein Test überhaupt zwischen Personen differenziert. In der Forschungsmethodik ist die Varianzzerlegung (erklärt vs. nicht erklärt) das Kernprinzip der ANOVA und der Regression." },
  DEF_Std: { id: "DEF_Std", label: "Def. Std", text: "\\(\\text{Std}(X) := +\\bigl[\\text{Var}(X)\\bigr]^{1/2}\\)", desc: "Die Standardabweichung ist die positive Quadratwurzel der Varianz.",
    psychologie: "Die Standardabweichung hat gegenüber der Varianz den Vorteil, dass sie in derselben Einheit wie der Messwert angegeben wird. Der IQ hat SD = 15, T-Werte haben SD = 10. In der Diagnostik wird die SD benötigt, um z-Werte zu berechnen (\\(z = (X - M)/SD\\)), Konfidenzintervalle zu bilden und Effektstärken (Cohens d) zu interpretieren. Ein Therapieeffekt von d = 0.5 bedeutet eine Verbesserung um eine halbe Standardabweichung." },
  DEF_Kor: { id: "DEF_Kor", label: "Def. Kor", text: "\\(\\text{Kor}(X,Y) := \\frac{\\text{Cov}(X,Y)}{\\text{Std}(X) \\cdot \\text{Std}(Y)}\\)", desc: "Die Korrelation ist die standardisierte Kovarianz, sie liegt zwischen \\(-1\\) und \\(+1\\).",
    psychologie: "Die Korrelation ist das am häufigsten berichtete Zusammenhangsmaß in der Psychologie. r = 0.30 zwischen Gewissenhaftigkeit und Arbeitszufriedenheit ist ein ‚typischer' psychologischer Effekt. Der entscheidende Vorteil: Die Korrelation ist skalierungsinvariant – ob man Intelligenz in IQ-Punkten oder Rohwerten misst, die Korrelation mit Schulleistung bleibt gleich. Das macht Ergebnisse über Studien hinweg vergleichbar." },
  // Box G definitions
  DEF_BedE: { id: "DEF_BedE", label: "Def. E(Y|X=x)", text: "\\(E(Y \\mid X = x) := \\sum_{i=1}^{n} y_i \\cdot P(Y = y_i \\mid X = x)\\)", desc: "Der bedingte Erwartungswert von \\(Y\\) gegeben \\(X = x\\) ist der gewichtete Durchschnitt der \\(Y\\)-Werte unter der Bedingung \\(X = x\\).",
    psychologie: "Bedingte Erwartungswerte sind das Herzstück jeder Vorhersage in der Psychologie: Was erwarten wir für den Therapieerfolg (Y), wenn der Schweregrad (X) bekannt ist? Für Personen mit Schweregrad 7 ist der bedingte Erwartungswert z.\u00A0B. eine Symptomreduktion von 12 Punkten. Jede klinische Prognose, jede Schuleignungsempfehlung basiert auf einem bedingten Erwartungswert." },
  DEF_Reg: { id: "DEF_Reg", label: "Def. E(Y|X)", text: "\\(E(Y \\mid X)\\) ist eine Zufallsvariable (Funktion von \\(X\\)), deren Werte die bedingten Erwartungswerte \\(E(Y \\mid X = x)\\) sind.", desc: "\\(Y\\) heißt Regressand, \\(X\\) heißt Regressor. Die Regression ist die bestmögliche Vorhersage von \\(Y\\) durch \\(X\\).",
    psychologie: "Die Regression als Zufallsvariable zu verstehen ist ein Schlüsselkonzept: Die Vorhersagefunktion E(Y|X) ändert sich mit jedem neuen Patienten (weil X variiert). In der Diagnostik produziert jede Testung einen individuellen vorhergesagten Wert – die Gesamtheit aller möglichen Vorhersagen bildet die Zufallsvariable E(Y|X). Ihre Varianz ist die erklärte Varianz, und ihr Anteil an der Gesamtvarianz ist R²." },
  DEF_Res: { id: "DEF_Res", label: "Def. Residuum", text: "\\(\\varepsilon := Y - E(Y \\mid X)\\)", desc: "Das Residuum ist die nicht durch die Regression \\(E(Y \\mid X)\\) determinierte Komponente von \\(Y\\).",
    psychologie: "Das Residuum ist der Vorhersagefehler – die Differenz zwischen tatsächlichem und vorhergesagtem Wert. In der klinischen Diagnostik: Wenn der Therapieerfolg auf 60 Punkte vorhergesagt wird, aber 72 erreicht werden, ist ε = +12. Große Residuen identifizieren Personen, bei denen das Vorhersagemodell schlecht funktioniert – klinisch oft die interessantesten Fälle, die weitere Untersuchung erfordern." },
  DEF_R2: { id: "DEF_R2", label: "Def. R²", text: "\\(R^{2}_{Y|X} := \\frac{\\text{Var}\\bigl[E(Y \\mid X)\\bigr]}{\\text{Var}(Y)}\\)", desc: "Der Determinationskoeffizient gibt den durch die Regression erklärten Varianzanteil von \\(Y\\) an. Er misst die Stärke der regressiven Abhängigkeit.",
    psychologie: "R² ist die Standardkennzahl für Vorhersagequalität in der Psychologie. R² = 0.25 bedeutet: 25 % der Unterschiede im Kriterium werden durch den Prädiktor erklärt. In der Personalauswahl gilt R² = 0.10 als praktisch bedeutsam, in der kognitiven Psychologie erwartet man oft R² > 0.50. Das Verständnis von R² schützt vor Fehlinterpretationen: Ein ‚signifikanter' Prädiktor mit R² = 0.01 erklärt praktisch nichts." },
  DEF_RegUnabh: { id: "DEF_RegUnabh", label: "Def. Reg. Unabh.", text: "\\(E(Y \\mid X) = E(Y)\\)", desc: "Regressive Unabhängigkeit: Die Vorhersage von \\(Y\\) durch \\(X\\) ist für alle \\(X\\)-Werte gleich dem unbedingten Erwartungswert. Dann ist \\(R^{2}_{Y|X} = 0\\).",
    psychologie: "Wenn ein Prädiktor regressiv unabhängig vom Kriterium ist, liefert er keine Vorhersagekraft – die beste Prognose ist für alle Personen gleich (der Gesamtmittelwert). In der Personalauswahl: Wenn der Einstellungstest regressiv unabhängig von der Arbeitsleistung ist, kann man sich die Testung sparen. Regressive Unabhängigkeit ist auch das Nullmodell, gegen das jede Regression getestet wird." },
  DEF_LinReg: { id: "DEF_LinReg", label: "Def. Lin. Reg.", text: "\\(E(Y \\mid X) = \\alpha + \\beta X\\)", desc: "Lineare Regression: Die bedingte Erwartung ist eine lineare Funktion von \\(X\\). \\(\\alpha\\) ist der Intercept (\\(= E(Y|X=0)\\)), \\(\\beta\\) ist der Slope (Steigung).",
    psychologie: "Die lineare Regression ist das Arbeitspferd der psychologischen Forschung. β gibt an, um wie viele Einheiten sich Y ändert, wenn X um eine Einheit steigt – z.\u00A0B. ‚Pro IQ-Punkt steigt die Schulnote um 0.02 Punkte'. α ist der Achsenabschnitt: die Vorhersage bei X = 0. Die korrekte Interpretation dieser Parameter ist essentiell für evidenzbasierte Entscheidungen in Klinik und Beratung." },
  DEF_MultReg: { id: "DEF_MultReg", label: "Def. Mult. Reg.", text: "\\(E(Y \\mid X_1, X_2) = \\beta_0 + \\beta_1 X_1 + \\beta_2 X_2\\)", desc: "Multiple Regression: \\(\\beta_j\\) ist der Partialeffekt von \\(X_j\\) bei Kontrolle der anderen Regressoren.",
    psychologie: "In der Psychologie wirken fast immer mehrere Faktoren zusammen. Die multiple Regression erlaubt es, den ‚bereinigten' Effekt jedes Prädiktors zu bestimmen: Wie stark wirkt Motivation auf Schulleistung, wenn man Intelligenz kontrolliert? Partialeffekte sind die Grundlage für die Kontrolle von Confoundern und damit für kausale Schlussfolgerungen in nicht-experimentellen Designs." },
  DEF_OLS: { id: "DEF_OLS", label: "Def. OLS", text: "OLS minimiert \\(\\sum_{i=1}^{n}(Y_i - \\hat{Y}_i)^{2}\\)", desc: "Ordinary Least Squares: Die Schätzung der Regressionsparameter durch Minimierung der Summe der quadrierten Residuen.",
    psychologie: "OLS ist das Standardverfahren zur Schätzung von Regressionsmodellen in der Psychologie. Die Idee ist intuitiv: Finde die Gerade, die die quadrierten Vorhersagefehler minimiert. Jedes Mal, wenn in SPSS, R oder Mplus ein Regressionsmodell geschätzt wird, arbeitet im Hintergrund (oder eine Verallgemeinerung von) OLS. Das Verständnis von OLS hilft, die Grenzen der Methode zu erkennen: Sie ist empfindlich gegenüber Ausreißern und setzt Linearität voraus." },
};

// Rule cards (Box F.1 from Steyer & Eid)
const RULES = {
  E1: { id: "E1", label: "(i)", text: "\\(E(\\alpha) = \\alpha\\)", desc: "Der Erwartungswert einer Konstanten ist die Konstante selbst.",
    psychologie: "In der Diagnostik werden häufig Konstanten zu Testwerten addiert (z.\u00A0B. ein Schwierigkeitsparameter oder ein fester Zuschlag bei der Normierung). Um den erwarteten Gesamtwert eines Tests zu berechnen, muss man wissen, dass sich der Erwartungswert einer Konstanten nicht verändert – sie geht einfach als fester Wert in die Berechnung ein. Das ist auch die Grundlage dafür, Intercepts in Regressionsmodellen korrekt zu interpretieren." },
  E2: { id: "E2", label: "(ii)", text: "\\(E(\\alpha X + \\beta Y) = \\alpha E(X) + \\beta E(Y)\\)", desc: "Der Erwartungswert ist linear.",
    psychologie: "In der Psychologie bildet man ständig gewichtete Summen: Skalenwerte als Summe von Items, Composite-Scores aus Subtests, oder gewichtete Prädiktoren in der Regressionsdiagnostik. Die Linearität des Erwartungswerts erlaubt es, den erwarteten Gesamtwert direkt aus den Erwartungswerten der Einzelteile zu berechnen – z.\u00A0B. den erwarteten IQ-Gesamtwert aus den mittleren Subtestwerten. Ohne diese Regel wäre die Interpretation zusammengesetzter Scores nicht möglich." },
  V1: { id: "V1", label: "(iii)", text: "\\(\\text{Var}(X) = E(X^{2}) - [E(X)]^{2}\\)", desc: "Verschiebungssatz der Varianz.",
    psychologie: "Der Verschiebungssatz ist die rechnerische Grundlage, um aus Rohdaten (Summen und Quadratsummen) die Varianz zu bestimmen. In der Forschungsmethodik wird er benötigt, um Streuungsmaße effizient zu berechnen – etwa bei der Varianzanalyse (ANOVA) oder bei der Bestimmung von Effektstärken. In der Diagnostik ist die Varianz die Basis für Reliabilität und Standardmessfehler." },
  V2: { id: "V2", label: "(iv)", text: "\\(\\text{Var}(X) = 0\\), falls \\(X = \\alpha\\) (Konstante)", desc: "Eine Konstante hat keine Streuung.",
    psychologie: "Wenn ein Testwert bei allen Personen identisch ausfällt (z.\u00A0B. ein Item, das jeder richtig löst), hat er keine Varianz und trägt weder zur Reliabilität noch zur Validität bei. Diese Regel erklärt, warum Items mit extremer Schwierigkeit (p ≈ 0 oder p ≈ 1) bei der Testkonstruktion eliminiert werden: Sie liefern keine Information über interindividuelle Unterschiede." },
  V3: { id: "V3", label: "(v)", text: "\\(\\text{Var}(\\alpha X) = \\alpha^{2} \\, \\text{Var}(X)\\)", desc: "Skalierung geht quadratisch in die Varianz ein.",
    psychologie: "Wenn man Testwerte umrechnet (z.\u00A0B. von Rohwerten in IQ-Punkte durch Multiplikation mit einem Faktor), verändert sich die Varianz quadratisch. Das ist entscheidend für die z-Standardisierung: Teilt man durch die Standardabweichung (σ), wird Var(X/σ) = Var(X)/σ² = 1. Auch bei der Gewichtung von Subtests in Testbatterien muss man wissen, dass ein doppeltes Gewicht die Varianz vervierfacht, nicht verdoppelt." },
  V4: { id: "V4", label: "(vi)", text: "\\(\\text{Var}(\\alpha + X) = \\text{Var}(X)\\)", desc: "Verschiebung ändert die Varianz nicht.",
    psychologie: "Ob man zu jedem IQ-Wert 100 addiert oder nicht – die Streuung bleibt gleich. Diese Translationsinvarianz ist grundlegend für die Normierung: Man kann Skalenmittelwerte beliebig verschieben (z.\u00A0B. auf M = 100 oder M = 50), ohne die Reliabilität oder die Differenzierungsfähigkeit des Tests zu verändern. Auch bei der Zentrierung von Prädiktoren in der Regression bleibt die Varianz erhalten." },
  V5: { id: "V5", label: "(vii)", text: "\\(\\text{Var}(\\alpha X + \\beta Y) = \\alpha^{2}\\text{Var}(X) + \\beta^{2}\\text{Var}(Y) + 2\\alpha\\beta\\text{Cov}(X,Y)\\)", desc: "Varianz einer Linearkombination zweier Zufallsvariablen.",
    psychologie: "Dies ist die zentrale Formel für die Diagnostik: Die Varianz eines Gesamttestwertes (Summe aus Subtests) hängt nicht nur von den Einzelvarianzen ab, sondern auch von den Kovarianzen zwischen den Subtests. Deshalb sind hoch korrelierende Items in einer Skala wünschenswert – sie erhöhen die Gesamtvarianz und damit die Reliabilität. In Strukturgleichungsmodellen wird diese Regel verwendet, um die modellimplizierte Kovarianzmatrix abzuleiten." },
  C1: { id: "C1", label: "(viii)", text: "\\(\\text{Cov}(X,Y) = E(XY) - E(X)\\,E(Y)\\)", desc: "Verschiebungssatz der Kovarianz.",
    psychologie: "Die Kovarianz ist das Fundament der Korrelation und damit der gesamten korrelativen Forschung in der Psychologie. Ob Zusammenhang zwischen Intelligenz und Schulleistung, zwischen Therapiedauer und Symptomreduktion, oder zwischen zwei Testitems – stets wird die Kovarianz benötigt. Der Verschiebungssatz ermöglicht die effiziente Berechnung aus Rohdaten (Produktsummen und Einzelsummen)." },
  C2: { id: "C2", label: "(ix)", text: "\\(\\text{Cov}(X,Y) = 0\\), falls \\(X = \\alpha\\) (Konstante)", desc: "Eine Konstante kovariiert mit nichts.",
    psychologie: "Ein Merkmal ohne Variation kann mit nichts zusammenhängen. In der Diagnostik bedeutet das: Ein Item, das alle Personen gleich beantworten, korreliert mit keinem Kriterium und ist für die Vorhersage nutzlos. In der Forschungsmethodik erklärt dies, warum Kovariaten in experimentellen Designs Varianz aufweisen müssen, um als Kontrollvariablen wirksam zu sein." },
  C3: { id: "C3", label: "(x)", text: "\\(\\text{Cov}(\\alpha X, \\beta Y) = \\alpha\\beta \\, \\text{Cov}(X,Y)\\)", desc: "Skalierungsfaktoren werden herausgezogen.",
    psychologie: "Wenn man Testwerte umskaliert (z.\u00A0B. Rohwerte in T-Werte), verändern sich Kovarianzen und Korrelationen vorhersagbar. Diese Regel erklärt, warum die Korrelation (als standardisierte Kovarianz) skalierungsinvariant ist – ein entscheidender Vorteil für den Vergleich von Zusammenhängen über verschiedene Studien hinweg. In der CFA steckt diese Regel in der Beziehung zwischen Faktorladungen und beobachteten Kovarianzen." },

    psychologie: "Paralleltest-Reliabilität ist der klassische Reliabilitätskoeffizient: Man gibt zwei parallele Testformen vor und korreliert die Ergebnisse. In der Praxis ist diese Anforderung sehr streng – zwei Tests müssen exakt das Gleiche messen mit gleicher Genauigkeit. Deshalb wird Paralleltest-Reliabilität selten direkt bestimmt, aber das Modell ist die theoretische Grundlage für die Retest-Reliabilität und für die Erkenntnis, dass Cronbachs α die Reliabilität unterschätzt, wenn Tests nicht parallel sind." },

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Shuffle multiple-choice options and update correct index
function shuffleMC(options, correctIndex) {
  const indexed = options.map((opt, i) => ({ opt, isCorrect: i === correctIndex }));
  for (let i = indexed.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indexed[i], indexed[j]] = [indexed[j], indexed[i]];
  }
  return {
    options: indexed.map(x => x.opt),
    correct: indexed.findIndex(x => x.isCorrect),
  };
}

  exercises.push({

  // MC: Warum quadrieren?
  exercises.push({
    type: "multiplechoice",

  // MC: Varianz als Spezialfall der Kovarianz
  exercises.push({

  // Fillblank: Varianz direkt aus Definition berechnen
  exercises.push({

    correct: 0,
    hint: "Die Standardabweichung hat den Vorteil, dass sie in derselben Einheit wie der Messwert angegeben wird (z.\u00A0B. IQ-Punkte), während die Varianz in quadrierten Einheiten vorliegt.",
    rule: "DEF_Std",

  });

  exercises.push({
    type: "multiplechoice",
    question: "Kann die Varianz negativ sein?",

      "Nein – die Varianz ist immer \\(\\geq 0\\), da quadrierte Abweichungen nie negativ sind",
      "Ja, wenn die Werte negativ sind",
      "Ja, bei negativer Kovarianz",
      "Nur bei normalverteilten Variablen ist sie immer positiv"
    ],
    correct: 0,
    hint: "\\(\\text{Var}(X) = E[(X - E(X))^{2}] \\geq 0\\), da der Erwartungswert eines nicht-negativen Terms nicht negativ sein kann. \\(\\text{Var}(X) = 0\\) nur wenn \\(X\\) eine Konstante ist.",
    rule: "DEF_Var",

  // V5: Linearkombination

  exercises.push({

    rule: "KOR4",
    level: 3,
  });

  return exercises;
}

    rule: "DEF_LinReg",
    psychologie: "Das ist die praktische Anwendung der Regressionsgleichung. Ein Psychologe mit \\(E(Y|X) = 10 + 0.5 \\cdot \\text{IQ}\\) kann sofort für einen Klienten mit IQ = 120 die erwartete Schulleistung ausrechnen: 10 + 0.5 · 120 = 70.",
    level: 2,

    correct: 0,

    level: 2,
  });

  return exercises;
}

    hint: "Eigenschaft G(x): \\(E(\\varepsilon \\mid X) = 0\\). Für jeden Wert von \\(X\\) ist der mittlere Vorhersagefehler null.",
    rule: "Res4",
    level: 2,
  });

  // Res6: Cov[ε, f(X)] = 0
  exercises.push({
    type: "multiplechoice",
    question: "Gegeben \\(\\varepsilon = Y - E(Y \\mid X)\\). Welche Aussage gilt?",
    options: [
      "\\(\\text{Cov}(\\varepsilon, f(X)) = 0\\) für jede numerische Funktion \\(f\\)",
      "\\(\\text{Cov}(\\varepsilon, X) > 0\\)",
      "\\(\\text{Var}(\\varepsilon) = \\text{Var}(Y)\\)",
      "\\(E(\\varepsilon) = E(Y)\\)"
    ],
    correct: 0,
    rule: "Res6",
    level: 2,
  });

  // Regressive Unabhängigkeit
  exercises.push({
    type: "multiplechoice",
    question: "Was bedeutet ‚regressive Unabhängigkeit' von \\(Y\\) und \\(X\\)?",
    options: [
      "\\(E(Y \\mid X) = E(Y)\\): Die Vorhersage hängt nicht von \\(X\\) ab",
      "\\(\\text{Cov}(X, Y) = 0\\)",
      "\\(\\text{Var}(Y \\mid X) = 0\\)",
      "\\(Y\\) und \\(X\\) sind stochastisch unabhängig"
    ],
    correct: 0,
    rule: "DEF_RegUnabh",
    psychologie: "Regressive Unabhängigkeit bedeutet: Egal welchen Wert der Prädiktor hat, die Vorhersage bleibt gleich dem Gesamtmittelwert. In der Diagnostik: Wenn ein Eignungstest regressiv unabhängig von der Arbeitsleistung ist, liefert er keinen Mehrwert über den Populationsdurchschnitt hinaus. Das ist das Nullmodell, gegen das jede prädiktive Validierung eines Tests geprüft wird.",
    level: 1,
  });

  return exercises;
}

// World 7: KTT Grundlagen
function generateW7Exercises() {
  const exercises = [];

  // === Level 1: Grundlegende Zerlegung und Definition ===

  // K1: Was ist die KTT-Zerlegung?
  exercises.push({
    type: "multiplechoice",
    question: "In der KTT: \\(Y_{i} = \\tau_{i} + \\varepsilon_{i}\\) – was ist \\(\\tau_{i}\\)?",

    correct: 0,
    rule: "K1",
    level: 1,
  });

  // K1: Definition des wahren Werts
  exercises.push({
    type: "multiplechoice",

    correct: 0,

    rule: "K1",
    level: 1,
  });

  // K1: Was ist εᵢ?
  exercises.push({
    type: "multiplechoice",
    question: "Was repräsentiert \\(\\varepsilon_{i}\\) in \\(Y_{i} = \\tau_{i} + \\varepsilon_{i}\\)?",

      "Den unsystematischen Messfehler (Tagesform, Raten, Ablenkung)",

      "Die Reliabilität des Tests"

    correct: 0,
    hint: "Der Messfehler \\(\\varepsilon_{i}\\) erfasst alle zufälligen Einflüsse, die den beobachteten Wert vom wahren Wert abweichen lassen. Systematische Fehler (Bias) sind kein Messfehler im Sinne der KTT.",
    rule: "K1",
    level: 1,
  });

  // === Level 1: Annahmen der KTT ===

  // K2: E(εᵢ) = 0
  exercises.push({
    type: "multiplechoice",
    question: "Welche Annahme der KTT besagt, dass Messfehler im Mittel null sind?",

    correct: 0,
    rule: "K2",
    level: 1,
  });

  // K2: Konzeptverständnis
  exercises.push({
    type: "multiplechoice",
    question: "\\(E(\\varepsilon_{i}) = 0\\) bedeutet praktisch:",
    options: [
      "Bei unendlich vielen Messungen derselben Person heben sich die Messfehler im Durchschnitt auf",
      "Jede einzelne Messung ist fehlerfrei",
      "Der Messfehler ist immer genau null",
      "Der wahre Wert ist null"
    ],
    correct: 0,
    hint: "Die Annahme sagt nicht, dass einzelne Messungen fehlerfrei sind – nur dass Messfehler unsystematisch sind: Manchmal misst der Test zu hoch, manchmal zu niedrig, im Mittel aber korrekt.",
    rule: "K2",
    level: 1,
  });

  // K2: Was folgt aus der Definition?
  exercises.push({
    type: "multiplechoice",
    question: "Folgt \\(E(\\varepsilon_{i}) = 0\\) direkt aus der Definition \\(\\tau_{i} := E(Y_{i} \\mid p_{U})\\)?",
    options: [
      "Ja – denn \\(E(\\varepsilon_{i}) = E(Y_{i} - \\tau_{i}) = E(Y_{i}) - \\tau_{i} = \\tau_{i} - \\tau_{i} = 0\\)",
      "Nein – es ist eine zusätzliche Annahme",
      "Nur wenn der Test reliabel ist",
      "Nur bei normalverteilten Messfehlern"
    ],
    correct: 0,
    hint: "Da \\(\\tau_{i} := E(Y_{i} \\mid p_{U})\\), folgt \\(E(\\varepsilon_{i}) = E(Y_{i} - \\tau_{i}) = E(Y_{i}) - \\tau_{i} = 0\\). Diese Eigenschaft ist eine direkte Konsequenz der Definition – keine zusätzliche Annahme!",
    rule: "K2",
    level: 1,
  });

  // K3: Unkorreliertheit von Messfehler und wahrem Wert
  exercises.push({
    type: "multiplechoice",
    question: "Was besagt die Eigenschaft \\(\\text{Cov}(\\varepsilon_{i}, \\tau_{j}) = 0\\)?",
    options: [
      "Messfehler und wahre Werte sind unkorreliert – die Fehlergröße hängt nicht von der wahren Merkmalsausprägung ab",
      "Messfehler sind immer gleich groß",
      "Der wahre Wert ist immer null",
      "Messfehler verschiedener Tests korrelieren"
    ],
    correct: 0,
    rule: "K3",
    level: 1,
  });

  // K3: Folgt aus Definition oder ist es eine Annahme?
  exercises.push({
    type: "multiplechoice",
    question: "Folgt \\(\\text{Cov}(\\varepsilon_{i}, \\tau_{j}) = 0\\) aus der Definition des wahren Werts?",
    options: [
      "Ja, für \\(i = j\\) folgt es aus der Definition \\(\\tau_{i} = E(Y_{i}|p_{U})\\); für \\(i \\neq j\\) ist es eine zusätzliche Annahme",
      "Ja, es folgt immer aus der Definition",
      "Nein, es ist immer eine zusätzliche Annahme",
      "Es folgt nur bei parallelen Tests"
    ],
    correct: 0,
    hint: "Für \\(i = j\\): Da \\(\\tau_{i} = E(Y_{i}|p_{U})\\), ist \\(\\varepsilon_{i}\\) das Residuum der Regression von \\(Y_{i}\\) auf \\(p_{U}\\), und Residuen sind per Definition unkorreliert mit der Vorhersage. Für \\(i \\neq j\\) (verschiedene Tests) muss man zusätzlich annehmen, dass der Messfehler des einen Tests nicht mit dem wahren Wert eines anderen Tests zusammenhängt.",
    rule: "K3",
    level: 2,
  });

  // K3: Praktische Bedeutung
  exercises.push({
    type: "multiplechoice",
    question: "Was bedeutet \\(\\text{Cov}(\\varepsilon_{i}, \\tau_{i}) = 0\\) für die Diagnostik?",
    options: [
      "Der Standardmessfehler ist für alle Personen gleich groß – ob hochbegabt oder durchschnittlich",
      "Hochbegabte Personen werden zuverlässiger gemessen",
      "Der Messfehler wird mit zunehmendem wahren Wert größer",
      "Man kann den Messfehler nur bei Personen mit durchschnittlichen Werten schätzen"
    ],
    correct: 0,
    hint: "Wenn \\(\\text{Cov}(\\varepsilon_{i}, \\tau_{i}) = 0\\), dann variiert die Messgenauigkeit nicht systematisch mit der Merkmalsausprägung. In der Item-Response-Theorie (IRT) wird diese Annahme allerdings aufgeweicht – dort kann die Messgenauigkeit vom Fähigkeitsniveau abhängen.",
    rule: "K3",
    level: 1,
  });

  // === Level 2: Varianzzerlegung und Reliabilität ===

  // K4: Konzeptfrage vor der Berechnung
  exercises.push({
    type: "multiplechoice",
    question: "In der KTT gilt \\(\\text{Var}(Y) = \\text{Var}(\\tau) + \\text{Var}(\\varepsilon)\\). Warum fehlt der Kovarianz-Term \\(2\\cdot\\text{Cov}(\\tau, \\varepsilon)\\)?",
    options: [
      "Weil \\(\\text{Cov}(\\tau, \\varepsilon) = 0\\) – wahre Werte und Messfehler sind unkorreliert",
      "Weil die Varianz immer additiv ist",
      "Weil \\(\\tau\\) eine Konstante ist",
      "Weil \\(\\varepsilon\\) immer null ist"
    ],
    correct: 0,
    hint: "Die allgemeine Regel lautet \\(\\text{Var}(X+Y) = \\text{Var}(X) + \\text{Var}(Y) + 2\\text{Cov}(X,Y)\\). Da in der KTT \\(\\text{Cov}(\\tau, \\varepsilon) = 0\\) gilt (KTT-3), fällt der Kovarianz-Term weg.",
    rule: "K4",
    level: 2,
  });

  // K4: Berechnung Var(Y)
  const k4_tau_var = randInt(4, 10);
  const k4_eps_var = randInt(1, 5);
  exercises.push({
    type: "fillblank",
    question: `Gegeben: \\(\\text{Var}(\\tau) = ${k4_tau_var}\\), \\(\\text{Var}(\\varepsilon) = ${k4_eps_var}\\). Berechne \\(\\text{Var}(Y)\\):`,
    prompt: `\\(\\text{Var}(Y) = \\text{Var}(\\tau) + \\text{Var}(\\varepsilon) = ${k4_tau_var} + ${k4_eps_var} = ?\\)`,
    answer: `${k4_tau_var + k4_eps_var}`,
    hint: `\\(\\text{Var}(Y) = ${k4_tau_var} + ${k4_eps_var} = ${k4_tau_var + k4_eps_var}\\)`,
    rule: "K4",
    level: 2,
  });

  // K4: Berechnung Var(ε) — umgekehrt
  const k4b_varY = randInt(10, 20);
  const k4b_varTau = randInt(5, k4b_varY - 2);
  exercises.push({
    type: "fillblank",
    question: `Gegeben: \\(\\text{Var}(Y) = ${k4b_varY}\\), \\(\\text{Var}(\\tau) = ${k4b_varTau}\\). Berechne die Fehlervarianz \\(\\text{Var}(\\varepsilon)\\):`,
    prompt: `\\(\\text{Var}(\\varepsilon) = \\text{Var}(Y) - \\text{Var}(\\tau) = ${k4b_varY} - ${k4b_varTau} = ?\\)`,
    answer: `${k4b_varY - k4b_varTau}`,
    hint: `\\(\\text{Var}(\\varepsilon) = ${k4b_varY} - ${k4b_varTau} = ${k4b_varY - k4b_varTau}\\)`,
    rule: "K4",
    level: 2,
  });

  // K5: Was ist Reliabilität konzeptuell?
  exercises.push({
    type: "multiplechoice",
    question: "Was gibt die Reliabilität \\(\\text{Rel}(Y) = \\frac{\\text{Var}(\\tau)}{\\text{Var}(Y)}\\) an?",
    options: [
      "Den Anteil der wahren Varianz an der Gesamtvarianz – wie viel der beobachteten Unterschiede ‚echt' sind",
      "Die mittlere Korrelation zwischen allen Items",
      "Den Anteil korrekt beantworteter Items",
      "Die Validität des Tests"
    ],
    correct: 0,
    hint: "Reliabilität = Var(τ)/Var(Y) beschreibt, welcher Anteil der beobachteten Testscore-Varianz auf echte Merkmalsunterschiede zurückgeht. Der Rest ist Messfehler.",
    rule: "K5",
    level: 2,
  });

  // K5: Berechnung Reliabilität
  const k5_tau = randInt(6, 12);
  const k5_y = randInt(10, 20);
  exercises.push({
    type: "fillblank",
    question: `Gegeben: \\(\\text{Var}(\\tau) = ${k5_tau}\\), \\(\\text{Var}(Y) = ${k5_y}\\). Berechne die Reliabilität \\(\\text{Rel}(Y)\\):`,
    prompt: `\\(\\text{Rel}(Y) = \\frac{\\text{Var}(\\tau)}{\\text{Var}(Y)} = \\frac{${k5_tau}}{${k5_y}} = ?\\)`,
    answer: `${(k5_tau / k5_y).toFixed(2)}`,
    hint: `\\(\\text{Rel}(Y) = \\frac{${k5_tau}}{${k5_y}} \\approx ${(k5_tau / k5_y).toFixed(2)}\\)`,
    rule: "K5",
    level: 2,
  });

  // K5: Interpretation Rel = 1 und Rel = 0
  exercises.push({
    type: "multiplechoice",
    question: "Was bedeutet \\(\\text{Rel}(Y) = 1\\)?",
    options: [
      "Es gibt keinen Messfehler: \\(\\text{Var}(\\varepsilon) = 0\\), der Test misst perfekt",
      "Alle Personen haben denselben Testwert",
      "Der wahre Wert ist null",
      "Der Test hat maximale Fehlervarianz"
    ],
    correct: 0,
    hint: "Bei Rel = 1 gilt Var(ε) = 0, d.\u00A0h. jede beobachtete Variation ist ‚echt'. Das ist ein theoretisches Ideal – in der Praxis gilt Rel < 1.",
    rule: "K5",
    level: 2,
  });

  exercises.push({
    type: "multiplechoice",
    question: "Was bedeutet \\(\\text{Rel}(Y) = 0\\)?",
    options: [
      "Die gesamte Varianz ist Messfehler: \\(\\text{Var}(\\tau) = 0\\), der Test differenziert nicht zwischen Personen",
      "Der Test ist perfekt reliabel",
      "Alle Messfehler sind null",
      "Der Test misst genau das, was er messen soll"
    ],
    correct: 0,
    hint: "Bei Rel = 0 ist Var(τ) = 0, d.\u00A0h. alle beobachteten Unterschiede sind reines Messrauschen. Der Test enthält keine Information über individuelle Unterschiede.",
    rule: "K5",
    level: 2,
  });

  // === Level 3: Standardmessfehler und Anwendung ===

  // Standardmessfehler berechnen
  const k5c_sd = randInt(10, 20);
  const k5c_rel_num = randInt(70, 95);
  const k5c_rel = k5c_rel_num / 100;
  const k5c_sem = (k5c_sd * Math.sqrt(1 - k5c_rel)).toFixed(1);
  exercises.push({
    type: "fillblank",
    question: `Ein IQ-Test hat \\(\\text{SD}(Y) = ${k5c_sd}\\) und \\(\\text{Rel}(Y) = ${k5c_rel}\\). Berechne den Standardmessfehler \\(\\text{SE} = \\text{SD}(Y) \\cdot \\sqrt{1 - \\text{Rel}(Y)}\\):`,
    prompt: `\\(\\text{SE} = ${k5c_sd} \\cdot \\sqrt{1 - ${k5c_rel}} = ${k5c_sd} \\cdot \\sqrt{${(1 - k5c_rel).toFixed(2)}} = ?\\)`,
    answer: `${k5c_sem}`,
    hint: `\\(\\text{SE} = ${k5c_sd} \\cdot \\sqrt{${(1 - k5c_rel).toFixed(2)}} = ${k5c_sd} \\cdot ${Math.sqrt(1 - k5c_rel).toFixed(3)} \\approx ${k5c_sem}\\)`,
    rule: "K5a",
    level: 3,
  });

  // Zusammenfassung: Definition vs. Annahme
  exercises.push({
    type: "multiplechoice",
    question: "Welche der folgenden KTT-Eigenschaften folgt NICHT aus der Definition \\(\\tau_{i} := E(Y_{i}|p_{U})\\), sondern ist eine zusätzliche Annahme?",
    options: [
      "\\(\\text{Cov}(\\varepsilon_{i}, \\tau_{j}) = 0\\) für \\(i \\neq j\\) (Messfehler von Test \\(i\\) unkorreliert mit wahrem Wert von Test \\(j\\))",
      "\\(E(\\varepsilon_{i}) = 0\\) (Messfehler hat Erwartungswert null)",
      "\\(\\text{Cov}(\\varepsilon_{i}, \\tau_{i}) = 0\\) (eigener Messfehler unkorreliert mit eigenem wahren Wert)",
      "\\(Y_{i} = \\tau_{i} + \\varepsilon_{i}\\) (Zerlegung in wahren Wert und Fehler)"
    ],
    correct: 0,
    hint: "\\(E(\\varepsilon_{i}) = 0\\) und \\(\\text{Cov}(\\varepsilon_{i}, \\tau_{i}) = 0\\) folgen beide aus der Definition von \\(\\tau_{i}\\) als bedingten Erwartungswert. Aber dass der Messfehler von Test \\(i\\) auch mit dem wahren Wert eines anderen Tests \\(j\\) unkorreliert ist – das muss man zusätzlich annehmen.",
    rule: "K3",
    level: 3,
  });

  return exercises;
}

    rule: "K8",

  exercises.push({
    type: "fillblank",
    question: `Ess. τ-äquivalent: \\(\\tau_{1} = \\eta + 3\\), \\(\\tau_{2} = \\eta + 1\\), \\(\\text{Var}(\\eta) = ${te_eta_var}\\). Berechne \\(\\text{Cov}(Y_{1}, Y_{2})\\):`,
    prompt: `\\(\\text{Cov}(Y_{1}, Y_{2}) = \\text{Var}(\\eta) = ?\\)`,
    answer: `${te_eta_var}`,
    hint: `Da beide Ladungen = 1: \\(\\text{Cov}(Y_{1}, Y_{2}) = 1 \\cdot 1 \\cdot \\text{Var}(\\eta) = ${te_eta_var}\\)`,
    rule: "K7",
    level: 2,
  });

  // Cronbachs α
  exercises.push({
    type: "multiplechoice",
    question: "Unter welchem KTT-Modell ist Cronbachs \\(\\alpha\\) ein exakter (nicht nur unterer) Schätzer der Reliabilität?",
    options: [
      "Dem essentiell τ-äquivalenten Modell (gleiche Ladungen, verschiedene Intercepts und Fehlervarianzen erlaubt)",
      "Dem τ-kongenerischen Modell (verschiedene Ladungen erlaubt)",
      "Dem parallelen Modell",
      "\\(\\alpha\\) ist unter allen Modellen exakt"
    ],
    correct: 0,
    hint: "Cronbachs \\(\\alpha\\) setzt gleiche Ladungen voraus (ess. τ-Äquivalenz). Wenn die Ladungen unterschiedlich sind (τ-kongenerisch), unterschätzt \\(\\alpha\\) die Reliabilität systematisch. Dann ist McDonalds \\(\\omega\\) der bessere Schätzer.",
    rule: "K7",
    level: 2,
  });

  // ===================================================================
  // Level 2b: τ-äquivalent — zusätzlich gleiche Intercepts
  // ===================================================================

  exercises.push({
    type: "multiplechoice",
    question: "Das τ-äquivalente Modell entsteht aus dem ess. τ-äquivalenten durch welche zusätzliche Einschränkung?",
    options: [
      "Alle Intercepts sind gleich: \\(\\alpha_{i} = \\alpha\\) für alle \\(i\\), d.\u00A0h. \\(\\tau_{1} = \\tau_{2} = \\ldots = \\alpha + \\eta\\)",
      "Alle Fehlervarianzen sind gleich",
      "Alle Ladungen sind verschieden",
      "Der Erwartungswert von \\(\\eta\\) ist null"
    ],
    correct: 0,
    hint: "τ-äquivalent bedeutet: Alle Items haben denselben wahren Wert (\\(\\tau_{i} = \\tau_{j}\\)). In CFA-Sprache: gleiche Ladungen UND gleiche Intercepts. Im Gegensatz zum ess. τ-äquivalenten Modell, wo nur die Ladungen gleich sein müssen.",
    rule: "K7",
    level: 2,
  });

  // Was bedeutet τ-Äquivalenz praktisch?
  exercises.push({
    type: "multiplechoice",
    question: "Wenn zwei Items τ-äquivalent sind (\\(\\tau_{1} = \\tau_{2}\\)), was bedeutet das inhaltlich?",
    options: [
      "Beide Items haben für jede Person denselben wahren Wert – sie messen dasselbe auf derselben Skala",
      "Beide Items haben dieselbe Fehlervarianz",
      "Beide Items haben denselben beobachteten Wert",
      "Beide Items korrelieren perfekt"
    ],
    correct: 0,
    hint: "τ-Äquivalenz ist eine starke Annahme: Nicht nur laden die Items gleich, sondern sie haben auch das gleiche Niveau. In der CFA heißt das: gleiche Faktorladungen UND gleiche Intercepts.",
    rule: "K7",
    level: 2,
  });

  // ===================================================================
  // Level 2c: Paralleles Modell — die stärkste Annahme
  // ===================================================================

  exercises.push({
    type: "multiplechoice",
    question: "Was fordert das parallele Modell zusätzlich zum τ-äquivalenten Modell?",
    options: [
      "Gleiche Fehlervarianzen: \\(\\text{Var}(\\varepsilon_{1}) = \\text{Var}(\\varepsilon_{2}) = \\ldots\\)",
      "Unterschiedliche Ladungen",
      "Verschiedene wahre Werte",
      "Korrelierte Messfehler"
    ],
    correct: 0,
    hint: "Parallele Items haben alles gleich: gleiche Ladungen (= 1), gleiche Intercepts, UND gleiche Fehlervarianzen. Das ist das restriktivste KTT-Modell.",
    rule: "K6",
    level: 2,
  });

  // Konsequenz für Varianzen und Kovarianzen
  exercises.push({
    type: "multiplechoice",
    question: "Im parallelen Modell (\\(\\tau_{1} = \\tau_{2}\\), \\(\\text{Var}(\\varepsilon_{1}) = \\text{Var}(\\varepsilon_{2})\\)) gilt:",
    options: [
      "Alle beobachteten Varianzen sind gleich UND alle Kovarianzen sind gleich: \\(\\text{Var}(Y_{i}) = \\text{Var}(Y_{j})\\) und \\(\\text{Cov}(Y_{i},Y_{j}) = \\text{Var}(\\eta)\\)",
      "Nur die Kovarianzen sind gleich, die Varianzen können verschieden sein",
      "Nur die Varianzen sind gleich, die Kovarianzen können verschieden sein",
      "Varianzen und Kovarianzen sind alle verschieden"
    ],
    correct: 0,
    hint: "Da \\(\\text{Var}(Y_{i}) = \\text{Var}(\\eta) + \\text{Var}(\\varepsilon_{i})\\) und die Fehlervarianzen gleich sind, sind auch die beobachteten Varianzen gleich. Die Kovarianzen sind ebenfalls alle gleich (= Var(η)). Die Kovarianzmatrix hat ein sehr einfaches Muster.",
    rule: "K6",
    level: 2,
  });

  // ===================================================================
  // Level 3: Modellhierarchie und SEM-Verknüpfung
  // ===================================================================

  // Die Hierarchie
  exercises.push({
    type: "multiplechoice",
    question: "Ordne die KTT-Modelle vom allgemeinsten (wenigste Restriktionen) zum strengsten:",
    options: [
      "τ-kongenerisch → ess. τ-äquivalent → τ-äquivalent → parallel",
      "parallel → τ-äquivalent → ess. τ-äquivalent → τ-kongenerisch",
      "ess. τ-äquivalent → τ-kongenerisch → parallel → τ-äquivalent",
      "Alle Modelle sind gleich restriktiv"
    ],
    correct: 0,
    hint: "Jede Stufe fügt Restriktionen hinzu: τ-kongenerisch (freie \\(\\alpha_{i}, \\beta_{i}\\)) → ess. τ-äquiv. (gleiche \\(\\beta_{i}\\)) → τ-äquiv. (+ gleiche \\(\\alpha_{i}\\)) → parallel (+ gleiche Fehlervarianzen).",
    rule: "K8",
    level: 3,
  });

  // SEM-Restriktionen Zuordnung
  exercises.push({
    type: "multiplechoice",
    question: "In der KTT gilt \\(\\tau_{i} = \\alpha_{i} + \\beta_{i}\\,\\eta\\). Welche Restriktion führt zum ess. τ-äquivalenten Modell?",
    options: [
      "Ladungen gleichsetzen: \\(\\beta_{1} = \\beta_{2} = \\ldots = 1\\)",
      "Intercepts gleichsetzen: \\(\\alpha_{1} = \\alpha_{2} = \\ldots\\)",
      "Fehlervarianzen gleichsetzen: \\(\\text{Var}(\\varepsilon_{1}) = \\text{Var}(\\varepsilon_{2}) = \\ldots\\)",
      "Faktorvarianz auf 1 fixieren"
    ],
    correct: 0,
    hint: "Der Schritt τ-kongenerisch → ess. τ-äquivalent bedeutet: Alle Ladungen \\(\\beta_{i}\\) werden auf 1 gesetzt. Es bleibt \\(\\tau_{i} = \\alpha_{i} + \\eta\\). Die Intercepts \\(\\alpha_{i}\\) dürfen weiterhin verschieden sein.",
    rule: "K7",
    level: 3,
  });

  exercises.push({
    type: "multiplechoice",
    question: "Was muss in der CFA zusätzlich restringiert werden, um vom ess. τ-äquivalenten zum τ-äquivalenten Modell zu kommen?",
    options: [
      "Die Intercepts gleichsetzen: \\(\\alpha_{1} = \\alpha_{2} = \\ldots\\)",
      "Die Faktorladungen gleichsetzen",
      "Die Fehlervarianzen gleichsetzen",
      "Korrelierte Fehler zulassen"
    ],
    correct: 0,
    hint: "Ess. τ-äquivalent hat bereits gleiche Ladungen (\\(\\beta_{i} = 1\\)). Der nächste Schritt (τ-äquivalent) erfordert zusätzlich gleiche Intercepts (\\(\\alpha_{i} = \\alpha\\)). Dann gilt \\(\\tau_{i} = \\alpha + \\eta\\) für alle Items – alle haben denselben wahren Wert.",
    rule: "K7",
    level: 3,
  });

  exercises.push({
    type: "multiplechoice",
    question: "Welche zusätzliche Restriktion führt vom τ-äquivalenten zum parallelen Modell in der CFA?",
    options: [
      "Fehlervarianzen gleichsetzen: \\(\\text{Var}(\\varepsilon_{1}) = \\text{Var}(\\varepsilon_{2}) = \\ldots\\)",
      "Ladungen gleichsetzen",
      "Intercepts gleichsetzen",
      "Faktorvarianz auf null setzen"
    ],
    correct: 0,
    hint: "Das parallele Modell hat gleiche Ladungen, gleiche Intercepts UND gleiche Fehlervarianzen – das ist die stärkste Forderung. In lavaan restringiert man zusätzlich die Residualvarianzen.",
    rule: "K6",
    level: 3,
  });

  // Zusammenfassungstabelle als MC
  exercises.push({
    type: "multiplechoice",
    question: "Welches Modell erlaubt verschiedene Ladungen (\\(\\beta_{i} \\neq \\beta_{j}\\)), verschiedene Intercepts UND verschiedene Fehlervarianzen?",
    options: [
      "Nur das τ-kongenerische Modell",
      "Das ess. τ-äquivalente Modell",
      "Das parallele Modell",
      "Alle KTT-Modelle"
    ],
    correct: 0,
    hint: "Nur im τ-kongenerischen Modell sind Ladungen, Intercepts und Fehlervarianzen alle frei. Jede Spezialisierung schränkt mindestens einen Parameter ein.",
    rule: "K8",
    level: 3,
  });

  // Reliabilitätsschätzer und Modellwahl
  exercises.push({
    type: "multiplechoice",
    question: "Warum wird in der modernen Diagnostik McDonalds \\(\\omega\\) gegenüber Cronbachs \\(\\alpha\\) empfohlen?",
    options: [
      "Weil \\(\\omega\\) auch bei unterschiedlichen Ladungen (τ-kongenerisches Modell) korrekt ist, während \\(\\alpha\\) gleiche Ladungen voraussetzt",
      "Weil \\(\\omega\\) einfacher zu berechnen ist",
      "Weil \\(\\alpha\\) immer die Reliabilität überschätzt",
      "Weil \\(\\omega\\) keine Annahmen macht"
    ],
    correct: 0,
    hint: "Cronbachs \\(\\alpha\\) ist nur unter ess. τ-Äquivalenz (gleiche Ladungen) ein korrekter Schätzer. Bei verschiedenen Ladungen (τ-kongenerisch) unterschätzt \\(\\alpha\\) die Reliabilität systematisch. McDonalds \\(\\omega\\) berücksichtigt die unterschiedlichen Ladungen und ist daher allgemeiner gültig.",
    rule: "K8",
    level: 3,
  });

  // Rechenaufgabe: τ-kongenerisch Kovarianz
  const tk2_b1 = randInt(2, 4);
  const tk2_b2 = randInt(1, 3);
  const tk2_varEta = randInt(2, 6);
  const tk2_varE1 = randInt(1, 4);
  exercises.push({
    type: "fillblank",
    question: `τ-kongenerisch: \\(\\beta_{1}=${tk2_b1}\\), \\(\\beta_{2}=${tk2_b2}\\), \\(\\text{Var}(\\eta)=${tk2_varEta}\\), \\(\\text{Var}(\\varepsilon_{1})=${tk2_varE1}\\). Berechne \\(\\text{Var}(Y_{1})\\):`,
    prompt: `\\(\\text{Var}(Y_{1}) = \\beta_{1}^{2}\\cdot\\text{Var}(\\eta) + \\text{Var}(\\varepsilon_{1}) = ${tk2_b1}^{2}\\cdot${tk2_varEta} + ${tk2_varE1} = ?\\)`,
    answer: `${tk2_b1*tk2_b1*tk2_varEta + tk2_varE1}`,
    hint: `\\(${tk2_b1*tk2_b1}\\cdot${tk2_varEta} + ${tk2_varE1} = ${tk2_b1*tk2_b1*tk2_varEta} + ${tk2_varE1} = ${tk2_b1*tk2_b1*tk2_varEta + tk2_varE1}\\)`,
    rule: "K8",
    level: 2,
  });

  // Rechenaufgabe: Paralleles Modell – Korrelation berechnen
  const par_varEta = randInt(4, 8);
  const par_varEps = randInt(1, 4);
  const par_varY = par_varEta + par_varEps;
  const par_corr = (par_varEta / par_varY).toFixed(2);
  exercises.push({
    type: "fillblank",
    question: `Paralleles Modell: \\(\\text{Var}(\\eta)=${par_varEta}\\), \\(\\text{Var}(\\varepsilon)=${par_varEps}\\) (gleich für alle Items). Berechne die Korrelation zwischen zwei parallelen Items \\(\\text{Kor}(Y_{1},Y_{2})\\):`,
    prompt: `\\(\\text{Kor}(Y_{1},Y_{2}) = \\frac{\\text{Cov}(Y_{1},Y_{2})}{\\text{Var}(Y)} = \\frac{\\text{Var}(\\eta)}{\\text{Var}(\\eta)+\\text{Var}(\\varepsilon)} = \\frac{${par_varEta}}{${par_varY}} = ?\\)`,
    answer: `${par_corr}`,
    hint: `\\(\\frac{${par_varEta}}{${par_varY}} = ${par_corr}\\). Im parallelen Modell ist die Korrelation zweier Items gleich der Reliabilität!`,
    rule: "K6",
    level: 3,
  });

  // Schlüsselerkenntnis: Korrelation = Reliabilität
  exercises.push({
    type: "multiplechoice",
    question: "Im parallelen Modell gilt: Die Korrelation zweier Items \\(\\text{Kor}(Y_{1},Y_{2})\\) ist gleich:",
    options: [
      "Der Reliabilität \\(\\text{Rel}(Y)\\) – das ist die theoretische Grundlage der Paralleltest-Reliabilität",
      "Der Validität",
      "Null",
      "Der Fehlervarianz"
    ],
    correct: 0,
    hint: "\\(\\text{Kor}(Y_{1},Y_{2}) = \\frac{\\text{Var}(\\eta)}{\\text{Var}(\\eta)+\\text{Var}(\\varepsilon)} = \\frac{\\text{Var}(\\tau)}{\\text{Var}(Y)} = \\text{Rel}(Y)\\). Das ist die Begründung, warum man aus der Korrelation paralleler Tests die Reliabilität schätzen kann.",
    rule: "K6",
    level: 3,
  });

  return exercises;
}

function generateW9Exercises() {
  const exercises = [];

  exercises.push({
    type: "multiplechoice",
    question: "In einem Pfaddiagramm bedeutet ein einseitiger Pfeil (→) von X nach Y:",
    options: [
      "Y wird (teilweise) durch X bestimmt: Y = ... + βX + ...",
      "X und Y sind korreliert",
      "X ist der Erwartungswert von Y",
      "X und Y haben die gleiche Varianz"
    ],
    correct: 0,
    rule: null,
    psychologie: "Pfaddiagramme sind die Sprache der Strukturgleichungsmodellierung (SEM), dem wichtigsten Werkzeug für komplexe psychologische Modelle. Jeder Pfeil steht für eine gerichtete Beziehung – z.\u00A0B. ‚Selbstwirksamkeit → Studienerfolg'. Wer Pfaddiagramme lesen kann, versteht auf einen Blick die Hypothesenstruktur einer Studie, ohne sich durch Seiten voller Gleichungen arbeiten zu müssen.",

  exercises.push({

      "X = Y",
      "\\(\\text{Var}(X) = \\text{Var}(Y)\\)"
    ],
    correct: 0,
    rule: null,
    psychologie: "Doppelpfeile repräsentieren Kovarianzen zwischen Variablen, deren Zusammenhang nicht kausal modelliert wird. In psychologischen Modellen treten sie häufig zwischen korrelierten Messfehlern auf (z.\u00A0B. wenn zwei Items eine gemeinsame Methodenvarianz teilen) oder zwischen latenten Faktoren (z.\u00A0B. Korrelation zwischen Angst und Depression als latente Variablen).",
    level: 1,
  });

  // Einfache Regression als Pfadmodell
  exercises.push({
    type: "multiplechoice",
    question: "Pfadmodell: \\(\\eta \\to Y_{1}\\) mit Pfadkoeffizient \\(\\beta_{1}\\) und Fehler \\(\\varepsilon_{1}\\). Was steht in der Gleichung \\(Y_{1} = \\;?\\;\\cdot\\eta + \\varepsilon_{1}\\) für '?'?",
    options: [
      "\\(\\beta_{1}\\) (der Pfadkoeffizient)",
      "\\(\\text{Var}(\\eta)\\)",
      "\\(\\varepsilon_{1}\\)",
      "\\(\\text{Cov}(\\eta, Y_{1})\\)"
    ],
    correct: 0,
    rule: null,
    psychologie: "Die Übersetzung Pfaddiagramm → Gleichung ist eine Kernkompetenz für das Verständnis von SEM-Output. Wenn Mplus oder lavaan ein Modell schätzt, stecken dahinter genau diese Gleichungen. Die Faktorladung β₁ gibt an, wie stark ein beobachteter Wert (z.\u00A0B. ein Fragebogenitem) den latenten Faktor (z.\u00A0B. Extraversion) widerspiegelt.",
    level: 2,
  });

  exercises.push({
    type: "fillblank",
    question: "Gegeben: \\(Y_{1} = \\beta_{1}\\eta + \\varepsilon_{1}\\). Da \\(\\text{Cov}(\\eta, \\varepsilon_{1}) = 0\\):",
    prompt: "\\(\\text{Var}(Y_{1}) = \\beta_{1}^{2}\\cdot\\text{Var}(\\eta) + \\text{Var}(\\varepsilon_{1})\\). Wenn \\(\\beta_{1} = 2\\), \\(\\text{Var}(\\eta) = 5\\), \\(\\text{Var}(\\varepsilon_{1}) = 3\\), dann \\(\\text{Var}(Y_{1}) = ?\\)",
    answer: "23",
    hint: "\\(\\text{Var}(Y_{1}) = 4\\cdot5 + 3 = 23\\)",
    rule: "V5",
    level: 2,
  });

  // Zwei Indikatoren
  exercises.push({
    type: "fillblank",
    question: "Pfadmodell: \\(\\eta \\to Y_{1}\\) (\\(\\beta_{1}\\)), \\(\\eta \\to Y_{2}\\) (\\(\\beta_{2}\\)). \\(\\text{Cov}(\\varepsilon_{1},\\varepsilon_{2})=0, \\text{Cov}(\\eta,\\varepsilon_{i})=0\\). Dann:",
    prompt: "\\(\\text{Cov}(Y_{1},Y_{2}) = \\beta_{1}\\cdot\\beta_{2}\\cdot\\text{Var}(\\eta)\\). Wenn \\(\\beta_{1}=2\\), \\(\\beta_{2}=3\\), \\(\\text{Var}(\\eta)=4\\), dann \\(\\text{Cov}(Y_{1},Y_{2}) = ?\\)",
    answer: "24",
    hint: "\\(\\text{Cov}(\\beta_{1}\\eta+\\varepsilon_{1}, \\beta_{2}\\eta+\\varepsilon_{2}) = \\beta_{1}\\beta_{2}\\text{Var}(\\eta) = 2\\cdot3\\cdot4 = 24\\)",
    rule: "C5",
    level: 3,
  });

  return exercises;
}

    answer: `${b2*b2*ve + ve2}`,

  // 3-indicator model
  exercises.push({
    type: "multiplechoice",
    question: "Für ein Modell mit 3 Indikatoren \\(Y_{1}, Y_{2}, Y_{3}\\) und einem Faktor \\(\\eta\\): Wie viele verschiedene Einträge hat die implizierte Kovarianzmatrix (symmetrisch)?",
    options: ["6 (3 Varianzen + 3 Kovarianzen)", "9", "3", "12"],
    correct: 0,
    rule: null,
    psychologie: "Die modellimplizierte Kovarianzmatrix Σ(θ) ist das Herzstück der SEM-Schätzung: Das Modell gilt als passend, wenn Σ(θ) ≈ S (beobachtete Kovarianzmatrix). Chi²-Test, RMSEA, CFI – alle Fit-Indizes vergleichen diese beiden Matrizen. Zu wissen, wie viele Einträge Σ hat, hilft auch zu verstehen, wie viele Freiheitsgrade ein Modell hat: df = Anzahl nicht-redundanter Einträge in S minus Anzahl freier Parameter.",
    level: 2,
  });

  exercises.push({
    type: "fillblank",
    question: "3-Faktormodell: \\(Y_{1}=1\\cdot\\eta+\\varepsilon_{1}\\), \\(Y_{2}=2\\cdot\\eta+\\varepsilon_{2}\\), \\(Y_{3}=3\\cdot\\eta+\\varepsilon_{3}\\). \\(\\text{Var}(\\eta)=4\\), alle \\(\\text{Var}(\\varepsilon_{i})=1\\).",
    prompt: "\\(\\text{Cov}(Y_{1},Y_{3}) = 1\\cdot3\\cdot4 = ?\\)",
    answer: "12",
    hint: "\\(\\text{Cov}(Y_{1},Y_{3}) = \\beta_{1}\\cdot\\beta_{3}\\cdot\\text{Var}(\\eta) = 1\\cdot3\\cdot4 = 12\\)",

function FillBlankExercise({ exercise, onAnswer }) {
  const [value, setValue] = useState('');
  const [showHint, setShowHint] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, [exercise]);

  const handleSubmit = () => {
    if (!value.trim()) return;
    const normalize = s => {
      const n = parseFloat(s.trim().replace(/,/g, '.'));
      return isNaN(n) ? s.trim().toLowerCase() : n;
    };
    const correct = normalize(value) === normalize(exercise.answer);
    onAnswer(correct);
    setValue('');
    setShowHint(false);
  };

  return (
    <div>
      <div style={{ fontSize: '1.1em', marginBottom: 8, lineHeight: 1.6 }}><MathText>{exercise.question}</MathText></div>
      <MathText block>{exercise.prompt.replace('?', '\\,\\boxed{\\phantom{00}}')}</MathText>
      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
        <input
          ref={inputRef}
          type="text"
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleSubmit()}
          placeholder="Deine Antwort..."
          style={{
            flex: 1,
            padding: '12px 16px',
            borderRadius: 12,
            border: '2px solid var(--input-border)',
            background: 'var(--input-bg)',
            color: 'var(--text)',
            fontSize: '1.1em',
            fontFamily: "'Cambria Math', Georgia, serif",
            outline: 'none',
          }}
        />
        <button onClick={handleSubmit} disabled={!value.trim()} style={{
          padding: '12px 24px',
          borderRadius: 12,
          border: 'none',
          background: value.trim() ? 'var(--green)' : 'var(--bg-light)',
          color: '#fff',
          fontWeight: 700,
          fontSize: '1em',
          transition: 'background 0.2s',
        }}>
          Prüfen
        </button>
      </div>
      {!showHint && (
        <button onClick={() => setShowHint(true)} style={{
          marginTop: 12,
          background: 'none',
          border: 'none',
          color: 'var(--text-dim)',
          fontSize: '0.85em',
          textDecoration: 'underline',
        }}>
          💡 Hinweis anzeigen
        </button>
      )}
      {showHint && (
        <div style={{
          marginTop: 12,
          padding: '10px 14px',
          background: 'var(--hint-bg)',
          border: '1px solid var(--hint-border)',
          borderRadius: 8,
          fontSize: '0.9em',
          color: 'var(--orange)',
        }}>
          💡 <MathText>{exercise.hint}</MathText>
        </div>
      )}
    </div>
  );
}

  const [selected, setSelected] = useState(null);

  const handleSelect = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    setTimeout(() => {
      onAnswer(idx === exercise.correct);
      setSelected(null);
    }, 800);
  };

  return (
    <div>
      <div style={{ fontSize: '1.1em', marginBottom: 16, lineHeight: 1.6 }}><MathText>{exercise.question}</MathText></div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {exercise.options.map((opt, idx) => {
          let bg = 'var(--bg-light)';
          let border = '2px solid transparent';
          if (selected !== null) {
            if (idx === exercise.correct) { bg = 'rgba(88,204,2,0.18)'; border = '2px solid var(--green)'; }
            else if (idx === selected && idx !== exercise.correct) { bg = 'rgba(255,75,75,0.18)'; border = '2px solid var(--red)'; }
          }
          return (
            <button key={idx} onClick={() => handleSelect(idx)} style={{
              padding: '14px 18px',
              borderRadius: 12,
              background: bg,
              border: border,
              color: 'var(--text)',
              textAlign: 'left',
              fontSize: '1em',
              transition: 'all 0.2s',
              cursor: selected !== null ? 'default' : 'pointer',
            }}>
              <span style={{ color: 'var(--text-dim)', marginRight: 10, fontWeight: 700 }}>
                {['A', 'B', 'C', 'D'][idx]}
              </span>
              <MathText>{opt}</MathText>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function getRulesForWorld(worldId) {
  if (worldId <= 1) return [DEF_RULES.DEF_E, RULES.E1, RULES.E2];
  if (worldId === 2) return [DEF_RULES.DEF_Var, DEF_RULES.DEF_Std, RULES.V1, RULES.V2, RULES.V3, RULES.V4, RULES.V5];
  if (worldId === 3) return [DEF_RULES.DEF_Cov, DEF_RULES.DEF_Kor, RULES.C1, RULES.C2, RULES.C3, RULES.C4, RULES.C5, RULES.KOR1, RULES.KOR2, RULES.KOR3, RULES.KOR4];
  if (worldId === 4) return [DEF_RULES.DEF_LinReg, DEF_RULES.DEF_MultReg, DEF_RULES.DEF_OLS, DEF_RULES.DEF_R2, DEF_RULES.DEF_RegUnabh];
  if (worldId === 5) return [DEF_RULES.DEF_BedE, DEF_RULES.DEF_Reg, DEF_RULES.DEF_Res, DEF_RULES.DEF_R2, DEF_RULES.DEF_RegUnabh, DEF_RULES.DEF_LinReg];
  if (worldId === 6) return [...Object.values(REG_RULES), DEF_RULES.DEF_LinReg, DEF_RULES.DEF_R2, DEF_RULES.DEF_RegUnabh];
  if (worldId === 7) return [KTT_RULES.K1, KTT_RULES.K2, KTT_RULES.K3, KTT_RULES.K4, KTT_RULES.K5, KTT_RULES.K5a];
  if (worldId === 8) return [KTT_RULES.K5, KTT_RULES.K6, KTT_RULES.K7, KTT_RULES.K8];
  return [...Object.values(DEF_RULES), ...Object.values(RULES), ...Object.values(REG_RULES), ...Object.values(KTT_RULES)];
}

function LevelSession({ worldId, onBack, progress, setProgress }) {
  const hasIntro = WORLD_INTROS[worldId] && WORLD_INTROS[worldId].length > 0;
  const [showIntro, setShowIntro] = useState(hasIntro);
  const [exercises, setExercises] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [lives, setLives] = useState(3);
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [sessionDone, setSessionDone] = useState(false);
  const [streak, setStreak] = useState(0);
  const [ruleMode, setRuleMode] = useState('current');

  useEffect(() => {
    const gen = EXERCISE_GENERATORS[worldId];
    if (gen) {
      setExercises(shuffleArray(gen()));
    }
  }, [worldId]);

  const handleAnswer = useCallback((correct) => {
    setFeedback(correct);
    if (correct) {
      setScore(s => s + 1);
      setStreak(s => s + 1);
    } else {
      setLives(l => l - 1);
      setStreak(0);
    }
    setTimeout(() => {
      setFeedback(null);
      if (!correct && lives <= 1) {
        setSessionDone(true);
        return;
      }
      if (currentIdx + 1 >= exercises.length) {
        setSessionDone(true);
        setProgress(p => ({
          ...p,
          [worldId]: { completed: score + (correct ? 1 : 0), total: exercises.length }
        }));
        return;
      }
      setCurrentIdx(i => i + 1);
    }, 2000);
  }, [currentIdx, exercises.length, lives, score, worldId, setProgress]);

  const world = WORLDS.find(w => w.id === worldId);
  if (!world) return <div>Loading...</div>;

  // Show intro first (after all hooks)
  if (showIntro) {
    return <WorldIntro worldId={worldId} onStart={() => setShowIntro(false)} onBack={onBack} />;
  }

  if (!exercises.length) return <div>Generating exercises...</div>;

  if (sessionDone) {
    return (
      <div style={{ maxWidth: 520, margin: '0 auto', padding: '40px 16px', textAlign: 'center' }}>
        <h2 style={{ fontSize: '2em', fontWeight: 800, marginBottom: 12 }}>
          {lives > 0 ? '🎉 Geschafft!' : '😢 Spiel vorbei'}
        </h2>
        <p style={{ fontSize: '1.2em', marginBottom: 24, color: 'var(--text-dim)' }}>
          Du hast {score} von {exercises.length} Aufgaben richtig gelöst.
        </p>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginBottom: 24, flexWrap: 'wrap' }}>
          <button onClick={onBack} style={{
            padding: '12px 24px',
            borderRadius: 12,
            border: 'none',
            background: 'var(--bg-light)',
            color: 'var(--text)',
            fontWeight: 700,
            fontSize: '1em',
          }}>
            Zur Übersicht
          </button>
          <button onClick={() => {
            setExercises(shuffleArray(EXERCISE_GENERATORS[worldId]()));
            setCurrentIdx(0);
            setLives(3);
            setScore(0);
            setSessionDone(false);
            setStreak(0);
          }} style={{
            padding: '12px 24px',
            borderRadius: 12,
            border: 'none',
            background: 'var(--green)',
            color: '#fff',
            fontWeight: 700,
            fontSize: '1em',
          }}>
            Nochmal üben
          </button>
        </div>
      </div>
    );
  }

  const ex = exercises[currentIdx];

  return (
    <div style={{ maxWidth: 520, margin: '0 auto', padding: '16px 16px 80px' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <button onClick={onBack} style={{
          background: 'none',
          border: 'none',
          color: 'var(--text-dim)',
          fontSize: '1.3em',
          padding: 4,
        }}>
          ✕
        </button>
        <div style={{ flex: 1 }}>
          <ProgressBar current={currentIdx} total={exercises.length} />
        </div>
        <Hearts lives={lives} />
      </div>

      {/* World title */}
      <div style={{
        display: 'flex',
        alignItems: 'center',
        gap: 8,
        marginBottom: 12,
        color: world.color,
        fontWeight: 700,
        fontSize: '0.9em',
      }}>
        <span>{world.icon}</span>
        <span>{world.name}</span>
        <span style={{ color: 'var(--text-dim)', fontWeight: 400 }}>
          — Aufgabe {currentIdx + 1}/{exercises.length}
        </span>
        {streak >= 3 && <span style={{ marginLeft: 'auto', color: 'var(--gold)' }}>🔥 {streak}</span>}
      </div>

      <RuleDisplay worldId={worldId} currentRule={ex.rule} ruleMode={ruleMode} setRuleMode={setRuleMode} />

      {/* Exercise */}
      {ex.type === 'fillblank' && <FillBlankExercise exercise={ex} onAnswer={handleAnswer} />}
      {ex.type === 'multiplechoice' && <MultipleChoiceExercise exercise={ex} onAnswer={handleAnswer} />}

      <FeedbackBanner correct={feedback} explanation={!feedback && ex.hint ? ex.hint : null} />
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [currentWorld, setCurrentWorld] = useState(null);
  const [progress, setProgress] = useState(() => {
    const p = {};
    WORLDS.forEach(w => { p[w.id] = { completed: 0, total: 0 }; });
    return p;
  });

  if (currentWorld) {
    return (
      <LevelSession
        worldId={currentWorld}
        onBack={() => setCurrentWorld(null)}
        progress={progress}
        setProgress={setProgress}
      />
    );
  }

  return <WorldMap onSelectWorld={setCurrentWorld} progress={progress} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<style>
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
input:focus {
  border-color: var(--blue) !important;
}
button:hover:not(:disabled) {
  filter: brightness(1.1);
}
</style>

<script>
// Theme sync: listen for postMessage from parent (Quarto) page
var _themeSetByParent = false;

function setTheme(theme, fromParent) {
  document.documentElement.setAttribute('data-theme', theme);
  if (fromParent) _themeSetByParent = true;
}

// Listen for theme messages from parent
window.addEventListener('message', function(e) {
  if (e.data && (e.data.theme === 'dark' || e.data.theme === 'light')) {
    setTheme(e.data.theme, true);
  }
});

// On load: try multiple detection strategies
(function() {
  function detectParentTheme() {
    try {
      var doc = window.parent.document;
      // 1. data-bs-theme (Bootstrap 5.3+ / Quarto standard)
      var t = doc.documentElement.getAttribute('data-bs-theme');
      if (t === 'dark' || t === 'light') return t;
      // 2. body class .quarto-dark
      if (doc.body && doc.body.classList.contains('quarto-dark')) return 'dark';
      // 3. Check for active darkly stylesheet
      var links = doc.querySelectorAll('link[rel="stylesheet"][href*="darkly"]');
      for (var i = 0; i < links.length; i++) {
        if (!links[i].disabled) return 'dark';
      }
      // 4. Check parent background color as heuristic
      if (doc.body) {
        var bg = window.parent.getComputedStyle(doc.body).backgroundColor;
        var match = bg.match(/\d+/g);
        if (match && match.length >= 3) {
          var brightness = (parseInt(match[0]) * 299 + parseInt(match[1]) * 587 + parseInt(match[2]) * 114) / 1000;
          if (brightness < 128) return 'dark';
        }
      }
    } catch(e) { /* cross-origin, ignore */ }
    return null;
  }

  // Try immediately and with retries
  function tryDetect(attempts) {
    if (_themeSetByParent) return; // parent already sent via postMessage
    var theme = detectParentTheme();
    if (theme) {
      setTheme(theme, false);
    } else if (attempts > 0) {
      setTimeout(function() { tryDetect(attempts - 1); }, 400);
    } else {
      // Final fallback: system preference
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark', false);
      }
    }
  }

  tryDetect(6);
})();

// Watch for system preference changes (only if parent hasn't taken control)
if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
    if (!_themeSetByParent) {
      setTheme(e.matches ? 'dark' : 'light', false);
    }
  });
}
</script>
